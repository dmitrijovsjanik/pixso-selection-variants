<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<style>
  /* ─── fast.ui.kit tokens ─── */
  :root {
    --brand-3: #f3e7fe;
    --brand-5: #d9b8fc;
    --brand-9: #b750ff;
    --brand-10: #a043e6;
    --brand-11: #8839bf;
    --brand-a-3: rgba(183, 80, 255, 0.12);
    --brand-a-4: rgba(183, 80, 255, 0.18);
    --neutral-0: #ffffff;
    --neutral-1: #fbfbfb;
    --neutral-2: #f5f5f5;
    --neutral-3: #eeeeee;
    --neutral-4: #e5e5e5;
    --neutral-5: #d9d9d9;
    --neutral-9: #8c8c8c;
    --neutral-11: #474747;
    --neutral-12: #353535;
    --neutral-a-2: rgba(0, 0, 0, 0.03);
    --neutral-a-3: rgba(0, 0, 0, 0.06);
    --neutral-a-4: rgba(0, 0, 0, 0.09);
    --neutral-a-6: rgba(0, 0, 0, 0.16);
    --neutral-a-9: rgba(0, 0, 0, 0.42);
    --neutral-a-11: rgba(0, 0, 0, 0.72);
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --radius-xl: 12px;
    --radius-full: 9999px;
    --shadow-sm: 0px 1px 2px 0px rgba(0, 0, 0, 0.05);
    --shadow-md: 0px 4px 6px -1px rgba(0, 0, 0, 0.1), 0px 2px 4px -2px rgba(0, 0, 0, 0.1);
    --transition-fast: 150ms ease;
    --transition-normal: 200ms ease;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    color: var(--neutral-12);
    background: var(--neutral-0);
    overflow-x: hidden;
    line-height: 1.4;
  }

  /* ─── Tabs (ContentSwitcher style) ─── */
  .tabs {
    display: flex;
    background: var(--neutral-3);
    position: sticky;
    top: 35px;
    z-index: 10;
    padding: 3px;
    gap: 2px;
  }

  .tab {
    flex: 1;
    padding: 6px 8px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-9);
    border: none;
    border-radius: var(--radius-lg);
    transition: all var(--transition-fast);
    user-select: none;
    background: transparent;
  }

  .tab:hover {
    color: var(--neutral-11);
  }

  .tab.active {
    color: var(--neutral-12);
    background: var(--neutral-0);
    box-shadow: var(--shadow-sm);
  }

  /* ─── Content ─── */
  .tab-content {
    display: none;
    padding: 0;
  }

  .tab-content.active {
    display: block;
  }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--neutral-9);
    text-align: center;
  }

  .empty-state svg {
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.5;
  }

  /* ─── Component Group ─── */
  .component-group {
    border-bottom: 1px solid var(--neutral-3);
  }

  .component-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 12px;
    background: var(--neutral-1);
    cursor: pointer;
    user-select: none;
    transition: background var(--transition-fast);
    position: sticky;
    top: 69px;
    z-index: 4;
  }

  .component-header:hover {
    background: var(--neutral-2);
  }

  .component-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--neutral-12);
    display: flex;
    align-items: center;
    min-width: 0;
    word-break: break-word;
    gap: 6px;
  }

  .component-count {
    font-size: 11px;
    color: var(--neutral-9);
    background: var(--neutral-a-3);
    padding: 1px 7px;
    border-radius: var(--radius-full);
    font-weight: 500;
  }

  .component-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .btn-icon {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neutral-9);
    transition: all var(--transition-fast);
  }

  .btn-icon:hover {
    background: var(--neutral-a-4);
    color: var(--neutral-12);
  }

  /* ─── Instance row ─── */
  .instance-row {
    padding: 8px 12px 8px calc(12px + var(--depth, 0) * 16px);
    border-bottom: 1px solid var(--neutral-a-2);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .instance-row:hover {
    background: var(--brand-a-3);
  }

  .instance-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .instance-name .icon {
    width: 14px;
    height: 14px;
    color: var(--brand-9);
    flex-shrink: 0;
  }

  .instance-path {
    font-size: 11px;
    color: var(--neutral-9);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── Properties ─── */
  .properties {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .property-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
  }

  .property-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-a-11);
    width: 50%;
    flex-shrink: 0;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }

  .property-control {
    width: 50%;
    flex-shrink: 0;
    min-width: 0;
  }

  /* ─── Shared input base (matches fast.ui.kit xs size) ─── */
  .property-control select,
  .property-control input[type="text"],
  .instance-swap-value,
  .swap-search-input {
    width: 100%;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    font-size: 12px;
    line-height: 20px;
    font-family: inherit;
    color: var(--neutral-12);
    background-color: var(--neutral-a-2);
    outline: none;
    box-sizing: border-box;
    transition: background-color var(--transition-fast), border-color var(--transition-fast);
  }

  .property-control select:hover,
  .property-control input[type="text"]:hover,
  .swap-search-input:hover {
    border-color: var(--neutral-9);
  }

  .property-control select:focus,
  .property-control input[type="text"]:focus,
  .swap-search-input:focus {
    background-color: var(--neutral-0);
    border-color: var(--brand-9);
  }

  .property-control input[type="text"]::placeholder,
  .swap-search-input::placeholder {
    color: var(--neutral-a-9);
  }

  .property-control select {
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    padding-right: 28px;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 12px;
    text-overflow: ellipsis;
  }

  .instance-swap-select {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    font-size: 12px;
    color: var(--neutral-12);
    background-color: var(--neutral-a-2);
    cursor: pointer;
    box-sizing: border-box;
    transition: border-color var(--transition-fast);
  }

  .instance-swap-select:hover {
    border-color: var(--neutral-9);
  }

  .swap-diamond {
    flex-shrink: 0;
    color: var(--brand-9);
    width: 10px;
    height: 10px;
  }

  .swap-select-text {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: rtl;
    text-align: left;
  }

  .swap-chevron {
    flex-shrink: 0;
    color: var(--neutral-9);
    width: 12px;
    height: 12px;
  }

  /* ─── Swap search ─── */
  .swap-search-wrap {
    position: relative;
  }

  .swap-search-input {
    border-color: var(--brand-9);
    background: var(--neutral-0);
  }

  .swap-search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 160px;
    overflow-y: auto;
    background: var(--neutral-0);
    border: 1px solid var(--neutral-3);
    border-radius: var(--radius-lg);
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
    z-index: 50;
    margin-top: 2px;
  }

  .swap-search-item {
    padding: 6px 8px;
    font-size: 12px;
    color: var(--neutral-11);
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background var(--transition-fast);
  }

  .swap-search-item:hover {
    background: var(--brand-a-3);
    color: var(--brand-9);
  }

  .swap-search-hint {
    padding: 8px;
    font-size: 11px;
    color: var(--neutral-9);
    text-align: center;
  }

  /* ─── Hidden layer icon ─── */
  .hidden-icon {
    display: inline-flex;
    align-items: center;
    color: var(--neutral-5);
    flex-shrink: 0;
    margin-left: 2px;
  }

  /* ─── Hugeicons overrides ─── */
  .hgi-stroke { font-size: inherit; vertical-align: middle; }

  /* ─── Swap Picker Panel ─── */
  .swap-picker {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--neutral-0);
    display: flex;
    flex-direction: column;
    animation: slideIn 0.15s ease;
  }

  .swap-picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--neutral-3);
    flex-shrink: 0;
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .swap-picker-header:hover {
    background: var(--neutral-2);
  }

  .swap-picker-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .swap-picker-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--neutral-3);
    flex-shrink: 0;
  }

  .swap-picker-search input {
    width: 100%;
    height: 32px;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--neutral-3);
    border-radius: var(--radius-lg);
    font-size: 13px;
    font-family: inherit;
    color: var(--neutral-12);
    background: var(--neutral-0) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E") no-repeat 10px center;
    background-size: 14px;
    outline: none;
    box-sizing: border-box;
    transition: border-color var(--transition-fast);
  }

  .swap-picker-search input:focus {
    border-color: var(--brand-9);
  }

  .swap-picker-search input::placeholder {
    color: var(--neutral-a-9);
  }

  .swap-source-select {
    width: 100%;
    height: 28px;
    margin-top: 6px;
    padding: 4px 28px 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    font-size: 12px;
    font-family: inherit;
    color: var(--neutral-12);
    background-color: var(--neutral-a-2);
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 12px;
    outline: none;
    box-sizing: border-box;
    cursor: pointer;
    transition: border-color var(--transition-fast);
  }

  .swap-source-select:hover {
    border-color: var(--neutral-9);
  }

  .swap-source-select:focus {
    border-color: var(--brand-9);
  }

  .swap-picker-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--neutral-3);
    flex-shrink: 0;
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .swap-picker-nav:hover {
    background: var(--neutral-2);
  }

  .swap-picker-body {
    flex: 1;
    overflow-y: auto;
  }

  .swap-picker-section {
    padding: 8px 0;
  }

  .swap-picker-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--neutral-9);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 12px 6px;
  }

  .swap-source-item,
  .swap-folder-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background var(--transition-fast);
    font-size: 13px;
    color: var(--neutral-12);
  }

  .swap-source-item:hover,
  .swap-folder-item:hover {
    background: var(--neutral-2);
  }

  .swap-source-icon,
  .swap-folder-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--neutral-9);
  }

  .swap-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-item-chevron {
    flex-shrink: 0;
    color: var(--neutral-5);
  }

  .swap-item-count {
    font-size: 11px;
    color: var(--neutral-9);
    flex-shrink: 0;
  }

  .swap-component-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .swap-component-item:hover {
    background: var(--brand-a-3);
  }

  .swap-component-item.current {
    background: var(--brand-a-3);
    border-left: 2px solid var(--brand-9);
  }

  .swap-thumb {
    width: 32px;
    height: 32px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
  }

  .swap-thumb-placeholder {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neutral-5);
  }

  .swap-thumb-loading {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: linear-gradient(90deg, var(--neutral-a-2) 25%, var(--neutral-3) 50%, var(--neutral-a-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    flex-shrink: 0;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .swap-thumb[src=""] {
    display: none;
  }

  .swap-thumb:not([src=""]) + .swap-thumb-loading {
    display: none;
  }

  .swap-comp-info {
    flex: 1;
    min-width: 0;
  }

  .swap-comp-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-comp-source {
    font-size: 10px;
    color: var(--neutral-9);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-picker-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--neutral-9);
    font-size: 12px;
    gap: 8px;
  }

  .swap-picker-empty {
    padding: 24px;
    text-align: center;
    color: var(--neutral-9);
    font-size: 12px;
  }

  /* ─── Toggle/Switch (fast.ui.kit Switcher: 24x14 small) ─── */
  .toggle {
    display: inline-flex;
    align-items: center;
    width: 24px;
    min-width: 24px;
    height: 14px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
    pointer-events: none;
  }

  .toggle-slider {
    display: block;
    width: 24px;
    height: 14px;
    background: var(--neutral-a-3);
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
    position: relative;
    flex-shrink: 0;
  }

  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 10px;
    width: 10px;
    left: 2px;
    top: 2px;
    background: var(--neutral-0);
    border-radius: 50%;
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition-fast);
  }

  .toggle:hover .toggle-slider {
    background: var(--neutral-a-6);
  }

  .toggle input:checked + .toggle-slider {
    background: var(--brand-9);
  }

  .toggle:hover input:checked + .toggle-slider {
    background: var(--brand-10);
  }

  .toggle input:checked + .toggle-slider::before {
    transform: translateX(10px);
  }

  /* ─── Bulk section ─── */
  .bulk-section {
    padding: 10px 12px;
  }

  .bulk-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .bulk-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
  }

  .btn-instances {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--brand-11);
    background: var(--brand-a-3);
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background var(--transition-fast);
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-instances:hover {
    background: var(--brand-a-4);
  }

  .btn-instances svg {
    flex-shrink: 0;
  }

  /* ─── Detail view (individual instances) ─── */
  .detail-view {
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-3);
    position: sticky;
    top: 69px;
    z-index: 5;
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .detail-header:hover {
    background: var(--neutral-2);
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: none;
    background: var(--neutral-a-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--neutral-11);
    transition: all var(--transition-fast);
    flex-shrink: 0;
  }

  .btn-back:hover {
    background: var(--neutral-a-4);
    color: var(--neutral-12);
  }

  .detail-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .detail-count {
    font-size: 11px;
    color: var(--neutral-9);
    font-weight: 500;
    flex-shrink: 0;
    margin-left: auto;
  }

  .detail-instance {
    padding: 0;
    border-bottom: 1px solid var(--neutral-a-2);
  }

  .detail-instance-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    cursor: pointer;
    position: sticky;
    top: 105px;
    z-index: 3;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-a-2);
  }

  .detail-instance-header .collapse-arrow {
    cursor: pointer;
    padding: 4px;
    margin: -4px 0;
  }

  .detail-instance .properties {
    padding: 0 12px 10px 12px;
  }

  .detail-instance-body {
    overflow: hidden;
  }

  .detail-instance.collapsed .detail-instance-body {
    display: none;
  }

  .detail-instance.collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }

  .detail-instance-header:hover .detail-instance-name {
    color: var(--brand-9);
  }

  .detail-instance-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    transition: color var(--transition-fast);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .detail-instance-icon {
    width: 14px;
    height: 14px;
    color: var(--brand-9);
    flex-shrink: 0;
  }

  .instance-thumb-shimmer {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: linear-gradient(90deg, var(--neutral-a-2) 25%, var(--neutral-3) 50%, var(--neutral-a-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    flex-shrink: 0;
  }

  .instance-thumb {
    width: 32px;
    height: 32px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
  }

  /* ─── Collapse arrow ─── */
  .collapse-arrow {
    display: inline-block;
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--neutral-9);
    transition: transform var(--transition-fast);
    margin-right: 4px;
  }

  .collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }

  .component-body {
    overflow: hidden;
  }

  .collapsed .component-body {
    display: none;
  }

  /* ─── Summary bar ─── */
  .summary-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--neutral-9);
    background: var(--neutral-1);
    border-bottom: 1px solid var(--neutral-3);
  }

  .summary-bar strong {
    color: var(--neutral-12);
    font-weight: 600;
  }

  /* ─── Go up bar ─── */
  .go-up-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-3);
    cursor: pointer;
    transition: background var(--transition-fast);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .go-up-bar:hover {
    background: var(--neutral-2);
  }

  .go-up-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--neutral-a-3);
    border-radius: var(--radius-sm);
    color: var(--neutral-11);
    flex-shrink: 0;
  }

  .go-up-bar:hover .go-up-icon {
    background: var(--neutral-a-4);
  }

  .go-up-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .go-up-bar.disabled {
    cursor: default;
    pointer-events: none;
    background: var(--neutral-1);
  }

  .go-up-bar.disabled .go-up-icon {
    color: var(--neutral-5);
  }

  .go-up-bar.disabled .go-up-label {
    color: var(--neutral-5);
  }

  /* ─── Loading state ─── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--neutral-9);
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--neutral-3);
    border-top-color: var(--brand-9);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="go-up-bar" class="go-up-bar disabled">
  <span class="go-up-icon">
    <i class="hgi-stroke hgi-arrow-up-01" style="font-size:12px"></i>
  </span>
  <span class="go-up-label">Top level — no parent</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="variants">Variants</div>
  <div class="tab" data-tab="instances">Instances</div>
</div>

<div id="variants-tab" class="tab-content active"></div>
<div id="instances-tab" class="tab-content"></div>

<script>
  // ─── State ───
  let currentData = null;
  let detailViewComponent = null; // null = bulk list, string = component name for detail view
  let parentInfo = null;  // {id, name} or null
  let swapOptionsMap = {}; // propName -> [{id, name}]
  let thumbnailCache = {}; // nodeId -> dataUrl

  // Normalize inconsistent slash separators: "Item /└" and "Item / └" both become "Item / └"
  function normSlashes(s) { return s.replace(/\s*\/\s*/g, ' / '); }

  // ─── Swap Picker State ───
  let swapPickerState = null;
  // Persistent cache — survives across picker open/close cycles
  let persistentLibraryCache = {};
  // When active: { propertyName, instanceId, componentName, level, history[], sources, libraryCache, preferredValues, searchResults }
  // level: "sources" | "folders" | "components" | "variants"

  // ─── Tab switching ───
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
    });
  });

  // ─── Go up button (permanent, not re-rendered) ───
  document.getElementById('go-up-bar').addEventListener('click', () => {
    if (parentInfo) {
      postMsg({ type: 'go-up' });
    }
  });

  // ─── Post message to sandbox ───
  function postMsg(msg) {
    parent.postMessage({ pluginMessage: msg }, '*');
  }

  // ─── Render empty state ───
  function renderEmpty(message) {
    return `
      <div class="empty-state">
        <i class="hgi-stroke hgi-cursor-01" style="font-size:40px"></i>
        <p>${message}</p>
      </div>`;
  }

  // ─── Clean property name (remove unique suffix like #123:456) ───
  function cleanPropName(name) {
    return name.replace(/#\d+:\d+$/, '').trim();
  }

  // ─── Check if a variant is boolean-like (true/false, yes/no) ───
  function isBooleanLikeVariant(prop) {
    if (prop.type !== 'VARIANT' || !prop.options || prop.options.length !== 2) return false;
    const sorted = prop.options.map(o => o.toLowerCase()).sort();
    return (sorted[0] === 'false' && sorted[1] === 'true') ||
           (sorted[0] === 'no' && sorted[1] === 'yes');
  }

  function getBooleanLikeChecked(prop) {
    const val = String(prop.currentValue).toLowerCase();
    return val === 'true' || val === 'yes';
  }

  function getBooleanLikeValues(prop) {
    const sorted = prop.options.map(o => o.toLowerCase()).sort();
    if (sorted[0] === 'false' && sorted[1] === 'true') {
      return { on: prop.options.find(o => o.toLowerCase() === 'true'), off: prop.options.find(o => o.toLowerCase() === 'false') };
    }
    return { on: prop.options.find(o => o.toLowerCase() === 'yes'), off: prop.options.find(o => o.toLowerCase() === 'no') };
  }

  // ─── Update "go up" bar (always in DOM, just update state) ───
  function updateGoUpBar() {
    const bar = document.getElementById('go-up-bar');
    if (!bar) return;
    const label = bar.querySelector('.go-up-label');
    if (parentInfo) {
      bar.classList.remove('disabled');
      label.innerHTML = `Go to parent selection: <strong>${escHtml(parentInfo.name)}</strong>`;
    } else {
      bar.classList.add('disabled');
      label.textContent = 'Top level — no parent';
    }
  }

  // ─── Render a property control ───
  function renderPropertyControl(prop, instanceId, isBulk, componentName) {
    const clean = cleanPropName(prop.name);

    // Boolean-like variants (true/false, yes/no) → render as toggle
    if (isBooleanLikeVariant(prop)) {
      const checked = getBooleanLikeChecked(prop);
      const vals = getBooleanLikeValues(prop);
      const evtType = isBulk ? 'bulk-set-variant' : 'set-variant';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <label class="toggle">
              <input type="checkbox" class="prop-variant-toggle" data-type="${evtType}" ${dataAttr}
                data-on="${escAttr(vals.on)}" data-off="${escAttr(vals.off)}" ${checked ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`;
    }

    if (prop.type === 'VARIANT' && prop.options && prop.options.length > 0) {
      const options = prop.options.map(opt =>
        `<option value="${escHtml(opt)}" ${opt === prop.currentValue ? 'selected' : ''}>${escHtml(opt)}</option>`
      ).join('');

      const evtType = isBulk ? 'bulk-set-variant' : 'set-variant';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <select class="prop-select" data-type="${evtType}" ${dataAttr}>
              ${options}
            </select>
          </div>
        </div>`;
    }

    if (prop.type === 'BOOLEAN') {
      const checked = prop.currentValue === true || prop.currentValue === 'true';
      const evtType = isBulk ? 'bulk-set-component-property' : 'set-component-property';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <label class="toggle">
              <input type="checkbox" class="prop-toggle" data-type="${evtType}" ${dataAttr} ${checked ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`;
    }

    if (prop.type === 'INSTANCE_SWAP') {
      const displayName = prop.currentValueName || 'Component';
      const sourceInfo = prop.currentValueSource || '';
      const swapData = isBulk
        ? `data-swap-component="${escAttr(componentName)}" data-swap-prop="${escAttr(prop.name)}"`
        : `data-swap-instance="${escAttr(instanceId)}" data-swap-prop="${escAttr(prop.name)}"`;
      const currentValAttr = `data-swap-current="${escAttr(String(prop.currentValue))}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <span class="instance-swap-select" data-open-swap-search ${swapData} ${currentValAttr} title="${escAttr(displayName)}">
              <i class="hgi-stroke hgi-diamond" style="font-size:10px"></i>
              <span class="swap-select-text">${escHtml(displayName)}</span>
              <i class="hgi-stroke hgi-arrow-down-01 swap-chevron" style="font-size:12px"></i>
            </span>
          </div>
        </div>`;
    }

    if (prop.type === 'TEXT') {
      const evtType = isBulk ? 'bulk-set-component-property' : 'set-component-property';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <input type="text" class="prop-text" data-type="${evtType}" ${dataAttr}
              value="${escAttr(String(prop.currentValue))}" />
          </div>
        </div>`;
    }

    return '';
  }

  // ─── Get merged properties for a group of instances (for bulk view) ───
  function getMergedProperties(instances) {
    // Merge variant properties
    const variantMap = {};
    const compPropMap = {};

    for (const inst of instances) {
      for (const vp of inst.variantProperties) {
        if (!variantMap[vp.name]) {
          variantMap[vp.name] = { ...vp, values: new Set() };
        }
        variantMap[vp.name].values.add(vp.currentValue);
        // Merge options
        for (const o of vp.options) variantMap[vp.name].options = vp.options;
      }

      for (const cp of inst.componentProperties) {
        if (!compPropMap[cp.name]) {
          compPropMap[cp.name] = { ...cp, values: new Set() };
        }
        compPropMap[cp.name].values.add(String(cp.currentValue));
      }
    }

    const variants = Object.values(variantMap).map(v => ({
      name: v.name,
      type: 'VARIANT',
      currentValue: v.values.size === 1 ? [...v.values][0] : '(mixed)',
      options: v.options || [],
    }));

    const compProps = Object.values(compPropMap).map(v => ({
      name: v.name,
      type: v.type,
      currentValue: v.values.size === 1 ? v.currentValue : '(mixed)',
      currentValueName: v.currentValueName,
      currentValueSource: v.currentValueSource,
      preferredValues: v.preferredValues,
      options: v.options,
    }));

    return { variants, compProps };
  }

  // ─── Render Variants tab ───
  function renderVariantsTab(data) {
    const container = document.getElementById('variants-tab');
    if (!data.hasSelection) {
      detailViewComponent = null;
      container.innerHTML = renderEmpty('Select an object to see<br/>variant properties');
      return;
    }

    const groups = data.groupedByComponent;
    const names = Object.keys(groups);

    if (names.length === 0) {
      detailViewComponent = null;
      container.innerHTML = renderEmpty('No instances found<br/>in selection');
      return;
    }

    // If detail view is active but component no longer exists in selection, go back
    if (detailViewComponent && !groups[detailViewComponent]) {
      detailViewComponent = null;
    }

    // ─── Detail view: individual instances of one component ───
    if (detailViewComponent) {
      renderDetailView(container, data, detailViewComponent);
      return;
    }

    // ─── Bulk list view (main) ───
    let html = '';
    html += `<div class="summary-bar"><strong>${data.instances.length}</strong> instance${data.instances.length > 1 ? 's' : ''} from <strong>${names.length}</strong> component${names.length > 1 ? 's' : ''}</div>`;

    for (const compName of names) {
      const instances = groups[compName];
      const hasVariants = instances.some(i => i.variantProperties.length > 0);
      const hasCompProps = instances.some(i => i.componentProperties.length > 0);

      if (!hasVariants && !hasCompProps) continue;

      const merged = getMergedProperties(instances);
      const firstThumb = thumbnailCache[instances[0]?.id] || '';
      const allHidden = instances.every(i => !i.visible);
      const hiddenIcon = `<span class="hidden-icon" title="All instances hidden"><i class="hgi-stroke hgi-eye-off" style="font-size:14px"></i></span>`;

      html += `<div class="component-group">`;
      html += `<div class="component-header">
        <span class="component-name">
          <img class="instance-thumb" data-thumb-id="${escAttr(instances[0]?.id || '')}" src="${firstThumb}" style="${firstThumb ? '' : 'display:none'}" />
          ${!firstThumb ? `<div class="instance-thumb-shimmer" data-thumb-placeholder="${escAttr(instances[0]?.id || '')}"></div>` : ''}
          ${escHtml(compName)}
          ${allHidden ? hiddenIcon : ''}
        </span>
        <div class="component-actions">
          ${instances.length > 1 ? `<button class="btn-instances" data-open-detail="${escAttr(compName)}">
            ${instances.length} · Edit each
            <i class="hgi-stroke hgi-arrow-right-01" style="font-size:12px"></i>
          </button>` : ''}
          <button class="btn-icon" title="Select all instances" data-select-component="${escAttr(compName)}">
            <i class="hgi-stroke hgi-grid-view" style="font-size:14px"></i>
          </button>
        </div>
      </div>`;

      html += `<div class="component-body">`;

      // Bulk controls
      html += `<div class="bulk-section">`;

      if (merged.variants.length > 0 || merged.compProps.length > 0) {

        html += `<div class="properties">`;
        for (const vp of merged.variants) {
          html += renderPropertyControl(vp, null, true, compName);
        }
        for (const cp of merged.compProps) {
          if (cp.type !== 'VARIANT') {
            html += renderPropertyControl(cp, null, true, compName);
          }
        }
        html += `</div>`;
      }

      html += `</div>`;
      html += `</div></div>`;
    }

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Render detail view for a single component's instances ───
  function renderDetailView(container, data, compName) {
    const instances = data.groupedByComponent[compName] || [];

    let html = `<div class="detail-view">`;

    // Header with back button
    html += `<div class="detail-header" data-back-to-bulk>
      <span class="go-up-icon">
        <i class="hgi-stroke hgi-arrow-left-01" style="font-size:12px"></i>
      </span>
      <span class="detail-title">${escHtml(compName)}</span>
      <span class="detail-count">${instances.length} instances</span>
    </div>`;

    // Individual instances with their controls
    for (const inst of instances) {
      if (inst.variantProperties.length === 0 && inst.componentProperties.length === 0) continue;

      const thumbSrc = thumbnailCache[inst.id] || '';
      html += `<div class="detail-instance">`;
      html += `<div class="detail-instance-header" data-instance-toggle data-click-instance="${escAttr(inst.id)}">
        <span class="collapse-arrow"></span>
        <img class="instance-thumb" data-thumb-id="${escAttr(inst.id)}" src="${thumbSrc}" style="${thumbSrc ? '' : 'display:none'}" />
        <i class="hgi-stroke hgi-diamond detail-instance-icon" style="font-size:14px;color:var(--brand-9);${thumbSrc ? 'display:none' : ''}"></i>
        <span class="detail-instance-name">${escHtml(inst.name)}</span>
        ${!inst.visible ? `<span class="hidden-icon" title="Hidden layer"><i class="hgi-stroke hgi-eye-off" style="font-size:14px"></i></span>` : ''}
      </div>`;

      html += `<div class="detail-instance-body"><div class="properties">`;
      for (const vp of inst.variantProperties) {
        html += renderPropertyControl({
          name: vp.name,
          type: 'VARIANT',
          currentValue: vp.currentValue,
          options: vp.options,
        }, inst.id, false, null);
      }
      for (const cp of inst.componentProperties) {
        if (cp.type !== 'VARIANT') {
          html += renderPropertyControl(cp, inst.id, false, null);
        }
      }
      html += `</div></div></div>`;
    }

    html += `</div>`;

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Render Instances tab ───
  function renderInstancesTab(data) {
    const container = document.getElementById('instances-tab');
    if (!data.hasSelection) {
      container.innerHTML = renderEmpty('Select an object to see<br/>nested instances');
      return;
    }

    const groups = data.groupedByComponent;
    const names = Object.keys(groups);

    if (names.length === 0) {
      container.innerHTML = renderEmpty('No instances found<br/>in selection');
      return;
    }

    let html = '';
    html += `<div class="summary-bar"><strong>${data.instances.length}</strong> instance${data.instances.length > 1 ? 's' : ''} from <strong>${names.length}</strong> component${names.length > 1 ? 's' : ''}</div>`;

    for (const compName of names) {
      const instances = groups[compName];
      const instThumb = thumbnailCache[instances[0]?.id] || '';

      html += `<div class="component-group">`;
      html += `<div class="component-header">
        <span class="component-name">
          <img class="instance-thumb" data-thumb-id="${escAttr(instances[0]?.id || '')}" src="${instThumb}" style="${instThumb ? '' : 'display:none'}" />
          ${!instThumb ? `<div class="instance-thumb-shimmer" data-thumb-placeholder="${escAttr(instances[0]?.id || '')}"></div>` : ''}
          ${escHtml(compName)}
        </span>
        <div class="component-actions">
          <span class="component-count">${instances.length}</span>
          <button class="btn-icon" title="Select all" data-select-component="${escAttr(compName)}">
            <i class="hgi-stroke hgi-grid-view" style="font-size:14px"></i>
          </button>
        </div>
      </div>`;

      html += `<div class="component-body">`;
      for (const inst of instances) {
        html += `<div class="instance-row" style="--depth: ${inst.depth}" data-click-instance="${escAttr(inst.id)}">`;
        html += `<div class="instance-name">
          <i class="hgi-stroke hgi-diamond icon" style="font-size:14px"></i>
          ${escHtml(inst.name)}
          ${!inst.visible ? `<span class="hidden-icon" title="Hidden"><i class="hgi-stroke hgi-eye-off" style="font-size:12px"></i></span>` : ''}
          ${inst.depth > 0 ? `<span style="color:#bbb;font-size:10px">depth ${inst.depth}</span>` : ''}
        </div>`;
        if (inst.path) {
          html += `<div class="instance-path" title="${escAttr(inst.path)}">${escHtml(inst.path)}</div>`;
        }
        html += `</div>`;
      }
      html += `</div></div>`;
    }

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Attach event listeners ───
  function attachEventListeners() {
    // Open swap picker
    document.querySelectorAll('[data-open-swap-search]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openSwapPicker(
          el.dataset.swapProp,
          el.dataset.swapInstance || null,
          el.dataset.swapComponent || null,
          el.dataset.swapCurrent || null
        );
      });
    });

    // Collapse/expand component groups
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.btn-icon') || e.target.closest('.component-actions')) return;
        el.closest('.component-group').classList.toggle('collapsed');
      });
    });

    // Collapse/expand detail instances (click on arrow)
    document.querySelectorAll('[data-instance-toggle] .collapse-arrow').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        el.closest('.detail-instance').classList.toggle('collapsed');
      });
    });


    // Open detail view for a component
    document.querySelectorAll('[data-open-detail]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        detailViewComponent = el.dataset.openDetail;
        if (currentData) renderVariantsTab(currentData);
      });
    });

    // Back to bulk view
    document.querySelectorAll('[data-back-to-bulk]').forEach(el => {
      el.addEventListener('click', () => {
        detailViewComponent = null;
        if (currentData) renderVariantsTab(currentData);
      });
    });

    // Click instance name in detail view to select
    document.querySelectorAll('.detail-instance-header[data-click-instance]').forEach(el => {
      el.addEventListener('click', () => {
        postMsg({ type: 'select-instance', instanceId: el.dataset.clickInstance });
      });
    });

    // Select component instances
    document.querySelectorAll('[data-select-component]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        postMsg({ type: 'select-instances-by-component', componentName: el.dataset.selectComponent });
      });
    });

    // Click instance to select
    document.querySelectorAll('[data-click-instance]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.properties') || e.target.closest('select') ||
            e.target.closest('input') || e.target.closest('.toggle')) return;
        postMsg({ type: 'select-instance', instanceId: el.dataset.clickInstance });
      });
    });

    // Variant selects
    document.querySelectorAll('.prop-select').forEach(el => {
      el.addEventListener('change', () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.value };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Boolean toggles
    document.querySelectorAll('.prop-toggle').forEach(el => {
      el.addEventListener('change', () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.checked };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Boolean-like variant toggles (true/false, yes/no)
    document.querySelectorAll('.prop-variant-toggle').forEach(el => {
      el.addEventListener('change', () => {
        const newValue = el.checked ? el.dataset.on : el.dataset.off;
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Text inputs (on blur / enter)
    document.querySelectorAll('.prop-text').forEach(el => {
      const send = () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.value };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      };
      el.addEventListener('blur', send);
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    });
  }

  // ─── HTML escaping ───
  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function escAttr(str) {
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ─── Find component in cached sources ───
  function findComponentInCache(compKey, subPath) {
    if (!swapPickerState) return null;
    for (const [sourceKey, data] of Object.entries(swapPickerState.libraryCache)) {
      if (!data || !data.folders) continue;
      for (const folder of data.folders) {
        for (const comp of folder.components) {
          if (comp.key === compKey || comp.id === compKey) {
            return { sourceKey, folderName: folder.name };
          }
          if (comp.type === 'COMPONENT_SET' && comp.variants) {
            for (const v of comp.variants) {
              if (v.key === compKey || v.id === compKey) {
                return { sourceKey, folderName: folder.name };
              }
            }
          }
        }
      }
    }
    return null;
  }

  function applyFoundComponent(found, subPath) {
    if (!swapPickerState) return;
    const s = swapPickerState;
    s.selectedSource = found.sourceKey;
    s.level = 'components';
    s.currentFolder = found.folderName;
    s.currentSubPath = subPath;

    // Set currentValue to componentKey for highlighting
    if (s.findComponentKey) {
      s.currentValue = s.findComponentKey;
    }

    // Push history for proper back navigation
    s.history = [];
    s.history.push({ level: 'folders', currentFolder: null, currentSubPath: null, currentSet: null });
    if (subPath) {
      s.history.push({ level: 'components', currentFolder: found.folderName, currentSubPath: null, currentSet: null });
    }

    renderSwapPicker(); // full re-render to update dropdown + nav + body
  }

  // ─── Bind click on swap search result items ───
  // ─── Swap Picker Functions ───

  const chevronSvg = `<i class="hgi-stroke hgi-arrow-right-01" style="font-size:14px"></i>`;
  const folderSvg = `<i class="hgi-stroke hgi-folder-01" style="font-size:16px"></i>`;
  const librarySvg = `<i class="hgi-stroke hgi-library" style="font-size:16px"></i>`;
  const compSvg = `<i class="hgi-stroke hgi-diamond" style="font-size:14px"></i>`;

  function openSwapPicker(propertyName, instanceId, componentName, currentValue) {
    swapPickerState = {
      propertyName,
      instanceId,
      componentName,
      currentValue: currentValue || null,
      level: 'loading',
      history: [],
      sources: null,
      libraryCache: persistentLibraryCache,
      prefKeys: [],
      searchResults: null,
      selectedSource: null,
      currentFolder: null,
      currentSubPath: null,
      currentSet: null,
    };

    // Instant navigation from cache: if we have cached data and a currentValue,
    // try to find the component and navigate immediately — zero roundtrips.
    let usedCache = false;
    if (currentValue && Object.keys(persistentLibraryCache).length > 0) {
      swapPickerState.findComponentKey = currentValue;
      swapPickerState.findComponentId = currentValue;
      for (const [cacheKey, data] of Object.entries(persistentLibraryCache)) {
        if (data && data.folders) {
          // Temporarily set source to try navigation
          swapPickerState.selectedSource = cacheKey;
          swapPickerState.level = 'folders';
          swapPickerState.sources = [{ key: cacheKey, name: cacheKey === '__local__' ? 'Local components' : cacheKey, type: cacheKey === '__local__' ? 'local' : 'library' }];
          autoNavigateToComponent(swapPickerState, data.folders);
          if (swapPickerState.level === 'components') {
            // Found it — navigation succeeded, skip re-navigation from sandbox response
            usedCache = true;
            swapPickerState.navigatedFromCache = true;
            break;
          }
        }
      }
      if (!usedCache) {
        // Reset to loading state
        swapPickerState.level = 'loading';
        swapPickerState.history = [];
        swapPickerState.selectedSource = null;
        swapPickerState.currentFolder = null;
        swapPickerState.currentSubPath = null;
        swapPickerState.findComponentKey = null;
        swapPickerState.findComponentId = null;
      }
    }

    document.body.style.overflow = 'hidden';
    renderSwapPicker();
    // Always send to sandbox — for sources update and in case cache is stale
    postMsg({ type: 'open-swap-picker', propertyName });
  }

  function closeSwapPicker() {
    swapPickerState = null;
    document.body.style.overflow = '';
    const el = document.querySelector('.swap-picker');
    if (el) el.remove();
  }

  function navigateSwapPicker(level, data) {
    if (!swapPickerState) return;
    swapPickerState.history.push({
      level: swapPickerState.level,
      currentFolder: swapPickerState.currentFolder,
      currentSubPath: swapPickerState.currentSubPath,
      currentSet: swapPickerState.currentSet,
    });
    swapPickerState.level = level;
    Object.assign(swapPickerState, data);
    swapPickerState.searchResults = null;
    renderSwapPicker(); // full re-render to update nav bar + body
  }

  function navigateSwapBack() {
    if (!swapPickerState) return;
    if (swapPickerState.history.length === 0) {
      closeSwapPicker();
      return;
    }
    const prev = swapPickerState.history.pop();
    swapPickerState.level = prev.level;
    swapPickerState.currentFolder = prev.currentFolder;
    swapPickerState.currentSubPath = prev.currentSubPath;
    swapPickerState.currentSet = prev.currentSet;
    swapPickerState.searchResults = null;
    renderSwapPicker(); // full re-render to update nav bar
  }

  // Find which folder contains the target component (by key or id) and navigate
  // into it, including sub-paths derived from "/" in component names.
  function autoNavigateToComponent(s, folders) {
    const targetKey = s.findComponentKey;
    const targetId = s.findComponentId;
    if (!targetKey && !targetId) return;

    function matches(k, id) {
      return (targetKey && (k === targetKey || id === targetKey))
          || (targetId && (k === targetId || id === targetId));
    }

    for (const folder of folders) {
      for (const comp of folder.components) {
        const hit = matches(comp.key, comp.id)
          || (comp.variants && comp.variants.some(v => matches(v.key, v.id)));
        if (hit) {
          // Navigate into the folder
          s.history.push({ level: 'folders', currentFolder: null, currentSubPath: null, currentSet: null });
          s.level = 'components';
          s.currentFolder = folder.name;

          // Extract sub-path and push a history entry for each intermediate level
          // "A / B / C / Icon" → subPath "A / B / C", history: [null, "A", "A / B"]
          const normComp = normSlashes(comp.name || '');
          const lastSlash = normComp.lastIndexOf(' / ');
          if (lastSlash > 0) {
            const subPath = normComp.substring(0, lastSlash);
            const parts = subPath.split(' / ');
            // Push root (no subPath)
            s.history.push({ level: 'components', currentFolder: folder.name, currentSubPath: null, currentSet: null });
            // Push each intermediate level
            for (let i = 0; i < parts.length - 1; i++) {
              s.history.push({ level: 'components', currentFolder: folder.name, currentSubPath: parts.slice(0, i + 1).join(' / '), currentSet: null });
            }
            s.currentSubPath = subPath;
          }

          s.findComponentKey = null;
          s.findComponentId = null;
          return;
        }
      }
    }
    // Not found — stay at folders level
    s.findComponentKey = null;
    s.findComponentId = null;
  }

  function applySwapFromPicker(componentIdOrKey) {
    if (!swapPickerState) return;
    postMsg({
      type: 'apply-swap-from-search',
      componentIdOrKey,
      propertyName: swapPickerState.propertyName,
      instanceId: swapPickerState.instanceId || null,
      bulkComponentName: swapPickerState.componentName || null,
    });
    closeSwapPicker();
  }

  function renderSwapPicker() {
    if (!swapPickerState) return;
    const s = swapPickerState;

    let picker = document.querySelector('.swap-picker');
    if (!picker) {
      picker = document.createElement('div');
      picker.className = 'swap-picker';
      document.body.appendChild(picker);
    }

    let title = 'Choose component';
    if (s.level === 'components') {
      if (s.currentSubPath) {
        const parts = s.currentSubPath.split(' / ');
        title = parts[parts.length - 1];
      } else if (s.currentFolder) {
        title = s.currentFolder;
      }
    }
    if (s.level === 'variants' && s.currentSet) title = s.currentSet.name;

    // Source dropdown options
    let sourceOptions = '';
    if (s.sources) {
      for (const src of s.sources) {
        sourceOptions += `<option value="${escAttr(src.key)}" ${s.selectedSource === src.key ? 'selected' : ''}>${escHtml(src.name)}</option>`;
      }
    }

    // Close bar — always visible at top
    let html = `<div class="swap-picker-header" id="swap-picker-close">
      <span class="swap-picker-title">Component picker</span>
      <span class="go-up-icon">
        <i class="hgi-stroke hgi-cancel-01" style="font-size:14px"></i>
      </span>
    </div>`;

    html += `<div class="swap-picker-search">
      <input type="text" id="swap-picker-search-input" placeholder="Search..." value="${escAttr(s.searchQuery || '')}" />
      <select class="swap-source-select" id="swap-source-select">${sourceOptions}</select>
    </div>`;

    // Folder navigation bar — shows when inside folders/sub-folders
    if (s.history.length > 0) {
      html += `<div class="swap-picker-nav" id="swap-picker-back">
        <span class="go-up-icon">
          <i class="hgi-stroke hgi-arrow-up-01" style="font-size:12px"></i>
        </span>
        <span class="go-up-label">${escHtml(title)}</span>
      </div>`;
    }

    html += `<div class="swap-picker-body" id="swap-picker-body">`;
    html += renderSwapPickerBodyContent();
    html += `</div>`;

    picker.innerHTML = html;

    // Back
    // Close picker
    document.getElementById('swap-picker-close').addEventListener('click', closeSwapPicker);

    // Navigate back in folders
    const backBtn = document.getElementById('swap-picker-back');
    if (backBtn) backBtn.addEventListener('click', navigateSwapBack);

    // Source select
    document.getElementById('swap-source-select').addEventListener('change', (e) => {
      const val = e.target.value;
      s.selectedSource = val;
      s.history = [];
      s.currentFolder = null;
      s.currentSet = null;
      s.searchResults = null;

      if (val === '__quickswap__') {
        s.level = 'quickswap';
        renderSwapPickerBody();
      } else {
        s.level = 'folders';
        renderSwapPickerBody();
        // Load if not cached
        if (!s.libraryCache[val]) {
          if (val === '__local__') {
            postMsg({ type: 'get-local-components' });
          } else {
            postMsg({ type: 'get-library-contents', libraryKey: val });
          }
        }
      }
    });

    // Search
    const searchInput = document.getElementById('swap-picker-search-input');
    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      s.searchQuery = q;
      if (q.length < 2) {
        s.searchResults = null;
        renderSwapPickerBody();
        return;
      }
      document.getElementById('swap-picker-body').innerHTML =
        `<div class="swap-picker-loading"><div class="spinner"></div>Searching...</div>`;
      searchTimer = setTimeout(() => {
        postMsg({ type: 'search-swap-all', query: q });
      }, 300);
    });
    searchInput.focus();

    bindPickerClicks();
    requestVisibleThumbnails();
  }

  // Resolve preferred value keys to {key, name, id, thumbnailUrl} from persistent cache
  function resolvePreferredFromCache(prefKeys) {
    const resolved = [];
    const keySet = new Set(prefKeys);
    for (const [, data] of Object.entries(persistentLibraryCache)) {
      if (!data || !data.folders) continue;
      for (const folder of data.folders) {
        for (const comp of folder.components) {
          if (keySet.has(comp.key) || keySet.has(comp.id)) {
            resolved.push({ key: comp.key || comp.id, name: comp.name, id: comp.id, thumbnailUrl: comp.thumbnailUrl || '' });
            keySet.delete(comp.key);
            keySet.delete(comp.id);
          }
          if (comp.variants) {
            for (const v of comp.variants) {
              if (keySet.has(v.key) || keySet.has(v.id)) {
                resolved.push({ key: v.key || v.id, name: comp.name + ' / ' + v.name, id: v.id, thumbnailUrl: v.thumbnailUrl || '' });
                keySet.delete(v.key);
                keySet.delete(v.id);
              }
            }
          }
          if (keySet.size === 0) return { resolved, unresolved: [] };
        }
      }
    }
    return { resolved, unresolved: Array.from(keySet) };
  }

  function renderPickerQuickSwap() {
    const s = swapPickerState;
    if (!s || !s.prefKeys || s.prefKeys.length === 0) return '';
    const { resolved } = resolvePreferredFromCache(s.prefKeys);
    if (resolved.length === 0) return '';

    let html = `<div class="swap-picker-section"><div class="swap-picker-section-title">Quick swap</div>`;
    for (const item of resolved) {
      let thumb;
      if (item.thumbnailUrl) {
        thumb = `<img class="swap-thumb" src="${escAttr(item.thumbnailUrl)}" onerror="this.style.display='none'" />`;
      } else if (item.id && thumbnailCache[item.id]) {
        thumb = `<img class="swap-thumb" src="${thumbnailCache[item.id]}" />`;
      } else if (item.id) {
        thumb = `<div class="swap-thumb-loading" data-thumb-id="${escAttr(item.id)}"></div>`;
      } else {
        thumb = `<div class="swap-thumb-placeholder"><i class="hgi-stroke hgi-diamond" style="font-size:14px"></i></div>`;
      }
      const isCurrent = s.currentValue && (item.key === s.currentValue || item.id === s.currentValue);
      html += `<div class="swap-component-item ${isCurrent ? 'current' : ''}" data-picker-apply="${escAttr(item.key)}">
        ${thumb}
        <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(item.name)}</div></div>
      </div>`;
    }
    html += `</div>`;
    return html;
  }

  function renderSwapPickerBodyContent() {
    if (!swapPickerState) return '';
    const s = swapPickerState;

    if (s.searchResults) return renderPickerSearchResults(s.searchResults);
    if (s.level === 'loading') return `<div class="swap-picker-loading"><div class="spinner"></div>Loading...</div>`;

    // Show quick swap section at the top if preferred keys exist and we're at folder/component level
    let quickSwapHtml = '';
    if (s.prefKeys && s.prefKeys.length > 0 && (s.level === 'folders' || s.level === 'components')) {
      quickSwapHtml = renderPickerQuickSwap();
    }

    if (s.level === 'folders') return quickSwapHtml + renderPickerFolders();
    if (s.level === 'components') return quickSwapHtml + renderPickerComponents();
    if (s.level === 'variants') return renderPickerVariants();
    return '';
  }

  function renderSwapPickerBody() {
    if (!swapPickerState) return;
    const body = document.getElementById('swap-picker-body');
    if (!body) return;
    body.innerHTML = renderSwapPickerBodyContent();
    bindPickerClicks();
    requestVisibleThumbnails();
  }

  // Request thumbnails for any visible components that don't have one yet
  function requestVisibleThumbnails() {
    const els = document.querySelectorAll('.swap-thumb-loading[data-thumb-id]');
    const ids = [];
    els.forEach(el => {
      const id = el.dataset.thumbId;
      if (id && !thumbnailCache[id] && ids.length < 20) {
        ids.push(id);
      }
    });
    if (ids.length > 0) {
      postMsg({ type: 'get-thumbnails', nodeIds: ids });
    }
  }

  function renderPickerFolders() {
    const s = swapPickerState;
    const cacheKey = s.selectedSource;
    const data = s.libraryCache[cacheKey];

    if (!data) {
      return `<div class="swap-picker-loading"><div class="spinner"></div>Loading...</div>`;
    }

    let html = '';
    for (const folder of data.folders) {
      html += `<div class="swap-folder-item" data-picker-folder="${escAttr(folder.name)}">
        <span class="swap-folder-icon">${folderSvg}</span>
        <span class="swap-item-name">${escHtml(folder.name)}</span>
        <span class="swap-item-count">${folder.components.length}</span>
        <span class="swap-item-chevron">${chevronSvg}</span>
      </div>`;
    }

    return html || `<div class="swap-picker-empty">No components found</div>`;
  }

  function renderPickerComponents() {
    const s = swapPickerState;
    const cacheKey = s.selectedSource;
    const data = s.libraryCache[cacheKey];
    if (!data) return `<div class="swap-picker-empty">No data</div>`;

    const folder = data.folders.find(f => f.name === s.currentFolder);
    if (!folder) return `<div class="swap-picker-empty">Folder not found</div>`;

    // Parse component names by "/" to create sub-groups
    // If we have a subPath filter, show only components matching that prefix
    const subPath = s.currentSubPath || '';

    // Group components: those with deeper "/" paths become sub-folders
    const normSub = subPath ? normSlashes(subPath) : '';
    const subFolders = {};
    const directComponents = [];

    for (const comp of folder.components) {
      // Normalize slash spacing: "Item /└" and "Item / └" → "Item / └"
      const normName = normSlashes(comp.name);

      let relativeName;
      if (!normSub) {
        relativeName = normName;
      } else if (normName.startsWith(normSub + ' / ')) {
        relativeName = normName.slice(normSub.length + 3);
      } else if (normName === normSub) {
        relativeName = normName.split(' / ').pop();
      } else {
        relativeName = null;
      }
      if (relativeName === null) continue;

      const slashIdx = relativeName.indexOf(' / ');
      if (slashIdx > 0) {
        // Has sub-path — group into folder
        const folderName = relativeName.substring(0, slashIdx);
        if (!subFolders[folderName]) subFolders[folderName] = 0;
        subFolders[folderName]++;
      } else {
        // Direct component at this level
        directComponents.push({ ...comp, displayName: relativeName });
      }
    }

    let html = '';

    // Render sub-folders first
    const subFolderNames = Object.keys(subFolders).sort();
    for (const sfName of subFolderNames) {
      html += `<div class="swap-folder-item" data-picker-subfolder="${escAttr(normSub ? normSub + ' / ' + sfName : sfName)}">
        <span class="swap-folder-icon">${folderSvg}</span>
        <span class="swap-item-name">${escHtml(sfName)}</span>
        <span class="swap-item-count">${subFolders[sfName]}</span>
        <span class="swap-item-chevron">${chevronSvg}</span>
      </div>`;
    }

    // Render direct components
    for (const comp of directComponents) {
      const isSet = comp.type === 'COMPONENT_SET';
      let thumb;
      if (comp.thumbnailUrl) {
        thumb = `<img class="swap-thumb" src="${escAttr(comp.thumbnailUrl)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="swap-thumb-placeholder" style="display:none">${compSvg}</div>`;
      } else if (comp.thumbnailDataUrl) {
        thumb = `<img class="swap-thumb" src="${comp.thumbnailDataUrl}" />`;
      } else if (comp.id && thumbnailCache[comp.id]) {
        thumb = `<img class="swap-thumb" src="${thumbnailCache[comp.id]}" />`;
      } else if (comp.id) {
        thumb = `<div class="swap-thumb-loading" data-thumb-id="${escAttr(comp.id)}"></div>`;
      } else {
        thumb = `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      }

      if (isSet && comp.variants && comp.variants.length > 0) {
        // Apply default variant (first) directly
        const defaultVariant = comp.variants[0];
        const applyId = defaultVariant.key || defaultVariant.id || comp.key || comp.id;
        const isCurrentSet = s.currentValue && comp.variants.some(v => (v.key === s.currentValue || v.id === s.currentValue));
        html += `<div class="swap-component-item ${isCurrentSet ? 'current' : ''}" data-picker-apply="${escAttr(applyId)}">
          ${thumb}
          <div class="swap-comp-info">
            <div class="swap-comp-name">${escHtml(comp.displayName || comp.name)}</div>
            <div class="swap-comp-source">${(comp.variants || []).length} variants</div>
          </div>
        </div>`;
      } else {
        const isCurrentComp = s.currentValue && (comp.key === s.currentValue || comp.id === s.currentValue);
        html += `<div class="swap-component-item ${isCurrentComp ? 'current' : ''}" data-picker-apply="${escAttr(comp.key || comp.id)}">
          ${thumb}
          <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(comp.displayName || comp.name)}</div></div>
        </div>`;
      }
    }

    // Scroll to current component if visible
    setTimeout(() => {
      const current = document.querySelector('.swap-component-item.current');
      if (current) current.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }, 50);

    return html || `<div class="swap-picker-empty">No components</div>`;
  }

  function renderPickerVariants() {
    const s = swapPickerState;
    if (!s.currentSet || !s.currentSet.variants) {
      return `<div class="swap-picker-empty">No variants</div>`;
    }

    let html = '';
    for (const v of s.currentSet.variants) {
      let thumb;
      if (v.thumbnailUrl) {
        thumb = `<img class="swap-thumb" src="${escAttr(v.thumbnailUrl)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="swap-thumb-placeholder" style="display:none">${compSvg}</div>`;
      } else {
        thumb = `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      }
      const isCurrentV = s.currentValue && (v.key === s.currentValue || v.id === s.currentValue);
      html += `<div class="swap-component-item ${isCurrentV ? 'current' : ''}" data-picker-apply="${escAttr(v.key || v.id)}">
        ${thumb}
        <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(v.name)}</div></div>
      </div>`;
    }

    return html;
  }

  function renderPickerSearchResults(results) {
    if (!results || results.length === 0) {
      return `<div class="swap-picker-empty">No components found</div>`;
    }

    let html = '';
    for (const r of results) {
      const thumb = r.thumbnailUrl
        ? `<img class="swap-thumb" src="${r.thumbnailUrl}" />`
        : `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      html += `<div class="swap-component-item" data-picker-apply="${escAttr(r.id)}">
        ${thumb}
        <div class="swap-comp-info">
          <div class="swap-comp-name">${escHtml(r.name)}</div>
          ${r.source ? `<div class="swap-comp-source">${escHtml(r.source)}</div>` : ''}
        </div>
      </div>`;
    }

    return html;
  }

  function bindPickerClicks() {
    // Apply swap
    document.querySelectorAll('[data-picker-apply]').forEach(el => {
      el.addEventListener('click', () => applySwapFromPicker(el.dataset.pickerApply));
    });

    // Navigate to folder
    document.querySelectorAll('[data-picker-folder]').forEach(el => {
      el.addEventListener('click', () => {
        navigateSwapPicker('components', { currentFolder: el.dataset.pickerFolder, currentSubPath: null });
      });
    });

    // Navigate into sub-folder (name prefix based)
    document.querySelectorAll('[data-picker-subfolder]').forEach(el => {
      el.addEventListener('click', () => {
        navigateSwapPicker('components', { currentSubPath: el.dataset.pickerSubfolder });
      });
    });

    // Navigate to component set (variants)
    document.querySelectorAll('[data-picker-set]').forEach(el => {
      el.addEventListener('click', () => {
        const variants = JSON.parse(el.dataset.setVariants || '[]');
        navigateSwapPicker('variants', {
          currentSet: { key: el.dataset.pickerSet, name: el.dataset.setName, variants },
        });
      });
    });
  }

  function bindSwapResultClicks(container) {
    container.querySelectorAll('.swap-search-item').forEach(item => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        postMsg({
          type: 'apply-swap-from-search',
          componentIdOrKey: item.dataset.applySwap,
          propertyName: item.dataset.applyProp,
          instanceId: item.dataset.applyInstance || null,
          bulkComponentName: item.dataset.applyComponent || null,
        });
      });
    });
  }

  // ─── Message from sandbox ───
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'loading') {
      const loadingHtml = `<div class="loading-state"><div class="spinner"></div><span class="loading-text">Scanning...</span></div>`;
      document.getElementById('variants-tab').innerHTML = loadingHtml;
      document.getElementById('instances-tab').innerHTML = loadingHtml;
    }

    if (msg.type === 'scan-progress') {
      document.querySelectorAll('.loading-text').forEach(el => {
        el.textContent = `Scanned ${msg.scanned} layers · ${msg.found} instances found`;
      });
    }

    if (msg.type === 'selection-data') {
      currentData = msg.data;
      parentInfo = msg.parentInfo || null;
      swapOptionsMap = {};
      updateGoUpBar();
      renderVariantsTab(currentData);
      renderInstancesTab(currentData);

      // Request thumbnails for component group headers (one per group — what's actually visible)
      if (currentData.groupedByComponent) {
        const ids = [];
        for (const compName of Object.keys(currentData.groupedByComponent)) {
          const first = currentData.groupedByComponent[compName][0];
          if (first && !thumbnailCache[first.id]) {
            ids.push(first.id);
          }
        }
        if (ids.length > 0) {
          postMsg({ type: 'get-thumbnails', nodeIds: ids });
        }
      }
    }

    if (msg.type === 'thumbnails') {
      console.log('[UI] thumbnails received:', Object.keys(msg.thumbnails || {}).length, 'of requested');
      const matchingEls = document.querySelectorAll('[data-thumb-id]').length;
      console.log('[UI] data-thumb-id elements in DOM:', matchingEls);
      Object.assign(thumbnailCache, msg.thumbnails || {});
      for (const [id, url] of Object.entries(msg.thumbnails || {})) {
        document.querySelectorAll(`[data-thumb-id="${id}"]`).forEach(el => {
          if (el.tagName === 'IMG') {
            el.src = url;
            el.style.display = 'block';
            // Remove placeholder icon if present
            document.querySelectorAll(`[data-thumb-placeholder="${id}"]`).forEach(p => p.remove());
          } else {
            // Replace shimmer div with img
            const img = document.createElement('img');
            img.className = 'swap-thumb';
            img.src = url;
            el.replaceWith(img);
          }
        });
      }
    }

    if (msg.type === 'search-results') {
      const resultsDiv = document.querySelector('.swap-search-results');
      if (!resultsDiv) return;
      if (msg.results.length === 0) {
        resultsDiv.innerHTML = '<div class="swap-search-hint">No components found</div>';
        return;
      }
      resultsDiv.innerHTML = msg.results.map(r =>
        `<div class="swap-search-item" data-apply-swap="${escAttr(r.id)}"
          data-apply-prop="${escAttr(msg.propertyName)}"
          ${msg.instanceId ? `data-apply-instance="${escAttr(msg.instanceId)}"` : ''}
          ${msg.componentName ? `data-apply-component="${escAttr(msg.componentName)}"` : ''}
        >${escHtml(r.name)}</div>`
      ).join('');
      bindSwapResultClicks(resultsDiv);
    }

    if (msg.type === 'swap-options') {
      const newOptions = msg.swapOptionsMap || {};
      Object.assign(swapOptionsMap, newOptions);
      if (currentData) {
        renderVariantsTab(currentData);
        renderInstancesTab(currentData);
      }
    }

    // ─── Swap Picker messages ───

    if (msg.type === 'swap-picker-data') {
      if (!swapPickerState || swapPickerState.propertyName !== msg.propertyName) return;
      const s = swapPickerState;

      s.sources = msg.sources;
      s.prefKeys = msg.prefKeys || [];

      // If already navigated from cache, just update the sources dropdown — don't re-render
      if (s.navigatedFromCache) {
        s.navigatedFromCache = false;
        const selectEl = document.getElementById('swap-source-select');
        if (selectEl) {
          let opts = '';
          for (const src of msg.sources) {
            opts += `<option value="${escAttr(src.key)}" ${s.selectedSource === src.key ? 'selected' : ''}>${escHtml(src.name)}</option>`;
          }
          selectEl.innerHTML = opts;
          selectEl.value = s.selectedSource;
        }
        return;
      }

      if (msg.navigateTo) {
        const nav = msg.navigateTo;

        let sourceKey = nav.libraryKey || '__local__';
        // If libraryKey isn't in the subscribed sources list, add it manually
        if (sourceKey !== '__local__' && !msg.sources.find(src => src.key === sourceKey)) {
          s.sources = [...msg.sources, { key: sourceKey, name: nav.libraryName || 'Library', type: 'library' }];
        }

        s.currentValue = nav.componentKey;
        s.findComponentKey = nav.componentKey;
        s.findComponentId = nav.componentId || null;
        s.selectedSource = sourceKey;
        s.level = 'folders';

        if (!s.libraryCache[sourceKey]) {
          if (sourceKey === '__local__') postMsg({ type: 'get-local-components' });
          else postMsg({ type: 'get-library-contents', libraryKey: sourceKey });
        } else {
          // Already cached — find the folder by component key and jump into it
          autoNavigateToComponent(s, s.libraryCache[sourceKey].folders);
        }
      } else {
        // No current component — show first available source for manual browse
        if (msg.sources.length > 0) {
          const first = msg.sources[0];
          s.selectedSource = first.key;
          s.level = 'folders';
          if (!s.libraryCache[first.key]) {
            if (first.type === 'local') postMsg({ type: 'get-local-components' });
            else postMsg({ type: 'get-library-contents', libraryKey: first.key });
          }
        }
      }

      renderSwapPicker();
    }

    if (msg.type === 'swap-picker-sources-update') {
      // Background update: full sources list arrived after fast-path local response
      if (swapPickerState) {
        swapPickerState.sources = msg.sources;
        // Update the dropdown without re-rendering the whole picker
        const selectEl = document.getElementById('swap-source-select');
        if (selectEl) {
          let opts = '';
          for (const src of msg.sources) {
            opts += `<option value="${escAttr(src.key)}" ${swapPickerState.selectedSource === src.key ? 'selected' : ''}>${escHtml(src.name)}</option>`;
          }
          selectEl.innerHTML = opts;
          selectEl.value = swapPickerState.selectedSource;
        }
      }
    }

    if (msg.type === 'library-contents') {
      if (swapPickerState) {
        swapPickerState.libraryCache[msg.libraryKey] = { folders: msg.folders };
        persistentLibraryCache[msg.libraryKey] = { folders: msg.folders };
        if (swapPickerState.findComponentKey && swapPickerState.level === 'folders') {
          autoNavigateToComponent(swapPickerState, msg.folders);
          renderSwapPicker();
        } else if (swapPickerState.level === 'folders') {
          // Only re-render if still waiting at folders level
          renderSwapPickerBody();
        }
        // If already navigated deeper (components/variants), don't re-render
      }
    }

    if (msg.type === 'local-contents') {
      if (swapPickerState) {
        swapPickerState.libraryCache['__local__'] = { folders: msg.folders };
        persistentLibraryCache['__local__'] = { folders: msg.folders };
        if (swapPickerState.findComponentKey && swapPickerState.level === 'folders' && swapPickerState.selectedSource === '__local__') {
          autoNavigateToComponent(swapPickerState, msg.folders);
          renderSwapPicker();
        } else if (swapPickerState.level === 'folders') {
          renderSwapPickerBody();
        }
        // If already navigated deeper, don't re-render

        // Request thumbnails for local components (first 30)
        const ids = [];
        for (const folder of msg.folders) {
          for (const comp of folder.components) {
            if (comp.id && !thumbnailCache[comp.id] && ids.length < 30) {
              ids.push(comp.id);
            }
          }
        }
        if (ids.length > 0) {
          postMsg({ type: 'get-thumbnails', nodeIds: ids });
        }
      }
    }

    if (msg.type === 'swap-search-results') {
      if (swapPickerState) {
        swapPickerState.searchResults = msg.results;
        renderSwapPickerBody();
      }
    }
  };
</script>
</body>
</html>
