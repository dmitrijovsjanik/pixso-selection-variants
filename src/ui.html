<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  /* ─── fast.ui.kit tokens ─── */
  :root {
    --brand-3: #f3e7fe;
    --brand-5: #d9b8fc;
    --brand-9: #b750ff;
    --brand-10: #a043e6;
    --brand-11: #8839bf;
    --brand-a-3: rgba(183, 80, 255, 0.12);
    --brand-a-4: rgba(183, 80, 255, 0.18);
    --neutral-0: #ffffff;
    --neutral-1: #fbfbfb;
    --neutral-2: #f5f5f5;
    --neutral-3: #eeeeee;
    --neutral-4: #e5e5e5;
    --neutral-5: #d9d9d9;
    --neutral-9: #8c8c8c;
    --neutral-11: #474747;
    --neutral-12: #353535;
    --neutral-a-2: rgba(0, 0, 0, 0.03);
    --neutral-a-3: rgba(0, 0, 0, 0.06);
    --neutral-a-4: rgba(0, 0, 0, 0.09);
    --neutral-a-6: rgba(0, 0, 0, 0.16);
    --neutral-a-9: rgba(0, 0, 0, 0.42);
    --neutral-a-11: rgba(0, 0, 0, 0.72);
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --radius-xl: 12px;
    --radius-full: 9999px;
    --shadow-sm: 0px 1px 2px 0px rgba(0, 0, 0, 0.05);
    --shadow-md: 0px 4px 6px -1px rgba(0, 0, 0, 0.1), 0px 2px 4px -2px rgba(0, 0, 0, 0.1);
    --transition-fast: 150ms ease;
    --transition-normal: 200ms ease;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    color: var(--neutral-12);
    background: var(--neutral-0);
    overflow-x: hidden;
    line-height: 1.4;
  }

  /* ─── Tabs (ContentSwitcher style) ─── */
  .tabs {
    display: flex;
    background: var(--neutral-3);
    position: sticky;
    top: 35px;
    z-index: 10;
    padding: 3px;
    gap: 2px;
  }

  .tab {
    flex: 1;
    padding: 6px 8px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-9);
    border: none;
    border-radius: var(--radius-lg);
    transition: all var(--transition-fast);
    user-select: none;
    background: transparent;
  }

  .tab:hover {
    color: var(--neutral-11);
  }

  .tab.active {
    color: var(--neutral-12);
    background: var(--neutral-0);
    box-shadow: var(--shadow-sm);
  }

  /* ─── Content ─── */
  .tab-content {
    display: none;
    padding: 0;
  }

  .tab-content.active {
    display: block;
  }

  /* ─── Empty state ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--neutral-9);
    text-align: center;
  }

  .empty-state svg {
    margin-bottom: 12px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.5;
  }

  /* ─── Component Group ─── */
  .component-group {
    border-bottom: 1px solid var(--neutral-3);
  }

  .component-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--neutral-1);
    cursor: pointer;
    user-select: none;
    transition: background var(--transition-fast);
    position: sticky;
    top: 69px;
    z-index: 4;
  }

  .component-header:hover {
    background: var(--neutral-2);
  }

  .component-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--neutral-12);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .component-count {
    font-size: 11px;
    color: var(--neutral-9);
    background: var(--neutral-a-3);
    padding: 1px 7px;
    border-radius: var(--radius-full);
    font-weight: 500;
  }

  .component-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-icon {
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neutral-9);
    transition: all var(--transition-fast);
  }

  .btn-icon:hover {
    background: var(--neutral-a-4);
    color: var(--neutral-12);
  }

  /* ─── Instance row ─── */
  .instance-row {
    padding: 8px 12px 8px calc(12px + var(--depth, 0) * 16px);
    border-bottom: 1px solid var(--neutral-a-2);
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .instance-row:hover {
    background: var(--brand-a-3);
  }

  .instance-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .instance-name .icon {
    width: 14px;
    height: 14px;
    color: var(--brand-9);
    flex-shrink: 0;
  }

  .instance-path {
    font-size: 11px;
    color: var(--neutral-9);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── Properties ─── */
  .properties {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .property-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
  }

  .property-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-a-11);
    width: 50%;
    flex-shrink: 0;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }

  .property-control {
    width: 50%;
    flex-shrink: 0;
    min-width: 0;
  }

  /* ─── Shared input base (matches fast.ui.kit xs size) ─── */
  .property-control select,
  .property-control input[type="text"],
  .instance-swap-value,
  .swap-search-input {
    width: 100%;
    height: 28px;
    padding: 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    font-size: 12px;
    line-height: 20px;
    font-family: inherit;
    color: var(--neutral-12);
    background-color: var(--neutral-a-2);
    outline: none;
    box-sizing: border-box;
    transition: background-color var(--transition-fast), border-color var(--transition-fast);
  }

  .property-control select:hover,
  .property-control input[type="text"]:hover,
  .swap-search-input:hover {
    border-color: var(--neutral-9);
  }

  .property-control select:focus,
  .property-control input[type="text"]:focus,
  .swap-search-input:focus {
    background-color: var(--neutral-0);
    border-color: var(--brand-9);
  }

  .property-control input[type="text"]::placeholder,
  .swap-search-input::placeholder {
    color: var(--neutral-a-9);
  }

  .property-control select {
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    padding-right: 28px;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 12px;
    text-overflow: ellipsis;
  }

  .instance-swap-value {
    display: flex;
    align-items: center;
    color: var(--neutral-9);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .instance-swap-value.clickable {
    cursor: pointer;
  }

  .instance-swap-value.clickable:hover {
    border-color: var(--neutral-9);
    color: var(--neutral-11);
  }

  .instance-swap-value.loading {
    color: var(--neutral-5);
    pointer-events: none;
  }

  /* ─── Swap search ─── */
  .swap-search-wrap {
    position: relative;
  }

  .swap-search-input {
    border-color: var(--brand-9);
    background: var(--neutral-0);
  }

  .swap-search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    max-height: 160px;
    overflow-y: auto;
    background: var(--neutral-0);
    border: 1px solid var(--neutral-3);
    border-radius: var(--radius-lg);
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
    z-index: 50;
    margin-top: 2px;
  }

  .swap-search-item {
    padding: 6px 8px;
    font-size: 12px;
    color: var(--neutral-11);
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background var(--transition-fast);
  }

  .swap-search-item:hover {
    background: var(--brand-a-3);
    color: var(--brand-9);
  }

  .swap-search-hint {
    padding: 8px;
    font-size: 11px;
    color: var(--neutral-9);
    text-align: center;
  }

  /* ─── Hidden layer icon ─── */
  .hidden-icon {
    display: inline-flex;
    align-items: center;
    color: var(--neutral-5);
    flex-shrink: 0;
    margin-left: 2px;
  }

  /* ─── Swap Picker Panel ─── */
  .swap-picker {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--neutral-0);
    display: flex;
    flex-direction: column;
    animation: slideIn 0.15s ease;
  }

  .swap-picker-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--neutral-3);
    flex-shrink: 0;
  }

  .swap-picker-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .swap-picker-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--neutral-3);
    flex-shrink: 0;
  }

  .swap-picker-search input {
    width: 100%;
    height: 32px;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--neutral-3);
    border-radius: var(--radius-lg);
    font-size: 13px;
    font-family: inherit;
    color: var(--neutral-12);
    background: var(--neutral-0) url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cpath d='M21 21l-4.35-4.35'/%3E%3C/svg%3E") no-repeat 10px center;
    background-size: 14px;
    outline: none;
    box-sizing: border-box;
    transition: border-color var(--transition-fast);
  }

  .swap-picker-search input:focus {
    border-color: var(--brand-9);
  }

  .swap-picker-search input::placeholder {
    color: var(--neutral-a-9);
  }

  .swap-source-select {
    width: 100%;
    height: 28px;
    margin-top: 6px;
    padding: 4px 28px 4px 8px;
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    font-size: 12px;
    font-family: inherit;
    color: var(--neutral-12);
    background-color: var(--neutral-a-2);
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%238c8c8c' stroke-width='2.5' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 12px;
    outline: none;
    box-sizing: border-box;
    cursor: pointer;
    transition: border-color var(--transition-fast);
  }

  .swap-source-select:hover {
    border-color: var(--neutral-9);
  }

  .swap-source-select:focus {
    border-color: var(--brand-9);
  }

  .swap-picker-body {
    flex: 1;
    overflow-y: auto;
  }

  .swap-picker-section {
    padding: 8px 0;
  }

  .swap-picker-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--neutral-9);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 12px 6px;
  }

  .swap-source-item,
  .swap-folder-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background var(--transition-fast);
    font-size: 13px;
    color: var(--neutral-12);
  }

  .swap-source-item:hover,
  .swap-folder-item:hover {
    background: var(--neutral-2);
  }

  .swap-source-icon,
  .swap-folder-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--neutral-9);
  }

  .swap-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-item-chevron {
    flex-shrink: 0;
    color: var(--neutral-5);
  }

  .swap-item-count {
    font-size: 11px;
    color: var(--neutral-9);
    flex-shrink: 0;
  }

  .swap-component-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background var(--transition-fast);
  }

  .swap-component-item:hover {
    background: var(--brand-a-3);
  }

  .swap-thumb {
    width: 32px;
    height: 32px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
  }

  .swap-thumb-placeholder {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--neutral-5);
  }

  .swap-comp-info {
    flex: 1;
    min-width: 0;
  }

  .swap-comp-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-comp-source {
    font-size: 10px;
    color: var(--neutral-9);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .swap-picker-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--neutral-9);
    font-size: 12px;
    gap: 8px;
  }

  .swap-picker-empty {
    padding: 24px;
    text-align: center;
    color: var(--neutral-9);
    font-size: 12px;
  }

  /* ─── Toggle/Switch (fast.ui.kit Switcher: 24x14 small) ─── */
  .toggle {
    display: inline-flex;
    align-items: center;
    width: 24px;
    min-width: 24px;
    height: 14px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
    pointer-events: none;
  }

  .toggle-slider {
    display: block;
    width: 24px;
    height: 14px;
    background: var(--neutral-a-3);
    border-radius: var(--radius-full);
    transition: background var(--transition-fast);
    position: relative;
    flex-shrink: 0;
  }

  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 10px;
    width: 10px;
    left: 2px;
    top: 2px;
    background: var(--neutral-0);
    border-radius: 50%;
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition-fast);
  }

  .toggle:hover .toggle-slider {
    background: var(--neutral-a-6);
  }

  .toggle input:checked + .toggle-slider {
    background: var(--brand-9);
  }

  .toggle:hover input:checked + .toggle-slider {
    background: var(--brand-10);
  }

  .toggle input:checked + .toggle-slider::before {
    transform: translateX(10px);
  }

  /* ─── Bulk section ─── */
  .bulk-section {
    padding: 10px 12px;
  }

  .bulk-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .bulk-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
  }

  .btn-instances {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--brand-11);
    background: var(--brand-a-3);
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    transition: background var(--transition-fast);
    font-family: inherit;
  }

  .btn-instances:hover {
    background: var(--brand-a-4);
  }

  .btn-instances svg {
    flex-shrink: 0;
  }

  /* ─── Detail view (individual instances) ─── */
  .detail-view {
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--neutral-1);
    border-bottom: 1px solid var(--neutral-3);
    position: sticky;
    top: 69px;
    z-index: 5;
  }

  .btn-back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: none;
    background: var(--neutral-a-3);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--neutral-11);
    transition: all var(--transition-fast);
    flex-shrink: 0;
  }

  .btn-back:hover {
    background: var(--neutral-a-4);
    color: var(--neutral-12);
  }

  .detail-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-12);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .detail-count {
    font-size: 11px;
    color: var(--neutral-9);
    font-weight: 500;
    flex-shrink: 0;
    margin-left: auto;
  }

  .detail-instance {
    padding: 0;
    border-bottom: 1px solid var(--neutral-a-2);
  }

  .detail-instance-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    cursor: pointer;
    position: sticky;
    top: 105px;
    z-index: 3;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-a-2);
  }

  .detail-instance-header .collapse-arrow {
    cursor: pointer;
    padding: 4px;
    margin: -4px 0;
  }

  .detail-instance .properties {
    padding: 0 12px 10px 12px;
  }

  .detail-instance-body {
    overflow: hidden;
  }

  .detail-instance.collapsed .detail-instance-body {
    display: none;
  }

  .detail-instance.collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }

  .detail-instance-header:hover .detail-instance-name {
    color: var(--brand-9);
  }

  .detail-instance-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    transition: color var(--transition-fast);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .detail-instance-icon {
    width: 14px;
    height: 14px;
    color: var(--brand-9);
    flex-shrink: 0;
  }

  .instance-thumb {
    width: 24px;
    height: 24px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    background: var(--neutral-a-2);
    flex-shrink: 0;
  }

  /* ─── Collapse arrow ─── */
  .collapse-arrow {
    display: inline-block;
    width: 0;
    height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid var(--neutral-9);
    transition: transform var(--transition-fast);
    margin-right: 4px;
  }

  .collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }

  .component-body {
    overflow: hidden;
  }

  .collapsed .component-body {
    display: none;
  }

  /* ─── Summary bar ─── */
  .summary-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--neutral-9);
    background: var(--neutral-1);
    border-bottom: 1px solid var(--neutral-3);
  }

  .summary-bar strong {
    color: var(--neutral-12);
    font-weight: 600;
  }

  /* ─── Go up bar ─── */
  .go-up-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    background: var(--neutral-0);
    border-bottom: 1px solid var(--neutral-3);
    cursor: pointer;
    transition: background var(--transition-fast);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .go-up-bar:hover {
    background: var(--neutral-2);
  }

  .go-up-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--neutral-a-3);
    border-radius: var(--radius-sm);
    color: var(--neutral-11);
    flex-shrink: 0;
  }

  .go-up-bar:hover .go-up-icon {
    background: var(--neutral-a-4);
  }

  .go-up-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-11);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .go-up-bar.disabled {
    cursor: default;
    pointer-events: none;
    background: var(--neutral-1);
  }

  .go-up-bar.disabled .go-up-icon {
    color: var(--neutral-5);
  }

  .go-up-bar.disabled .go-up-label {
    color: var(--neutral-5);
  }

  /* ─── Loading state ─── */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    color: var(--neutral-9);
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--neutral-3);
    border-top-color: var(--brand-9);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="go-up-bar" class="go-up-bar disabled">
  <span class="go-up-icon">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
  </span>
  <span class="go-up-label">Top level — no parent</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="variants">Variants</div>
  <div class="tab" data-tab="instances">Instances</div>
</div>

<div id="variants-tab" class="tab-content active"></div>
<div id="instances-tab" class="tab-content"></div>

<script>
  // ─── State ───
  let currentData = null;
  let detailViewComponent = null; // null = bulk list, string = component name for detail view
  let parentInfo = null;  // {id, name} or null
  let swapOptionsMap = {}; // propName -> [{id, name}]
  let thumbnailCache = {}; // nodeId -> dataUrl

  // ─── Swap Picker State ───
  let swapPickerState = null;
  // When active: { propertyName, instanceId, componentName, level, history[], sources, libraryCache, preferredValues, searchResults }
  // level: "sources" | "folders" | "components" | "variants"

  // ─── Tab switching ───
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
    });
  });

  // ─── Go up button (permanent, not re-rendered) ───
  document.getElementById('go-up-bar').addEventListener('click', () => {
    if (parentInfo) {
      postMsg({ type: 'go-up' });
    }
  });

  // ─── Post message to sandbox ───
  function postMsg(msg) {
    parent.postMessage({ pluginMessage: msg }, '*');
  }

  // ─── Render empty state ───
  function renderEmpty(message) {
    return `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 9l6 6M15 9l-6 6"/>
        </svg>
        <p>${message}</p>
      </div>`;
  }

  // ─── Clean property name (remove unique suffix like #123:456) ───
  function cleanPropName(name) {
    return name.replace(/#\d+:\d+$/, '').trim();
  }

  // ─── Check if a variant is boolean-like (true/false, yes/no) ───
  function isBooleanLikeVariant(prop) {
    if (prop.type !== 'VARIANT' || !prop.options || prop.options.length !== 2) return false;
    const sorted = prop.options.map(o => o.toLowerCase()).sort();
    return (sorted[0] === 'false' && sorted[1] === 'true') ||
           (sorted[0] === 'no' && sorted[1] === 'yes');
  }

  function getBooleanLikeChecked(prop) {
    const val = String(prop.currentValue).toLowerCase();
    return val === 'true' || val === 'yes';
  }

  function getBooleanLikeValues(prop) {
    const sorted = prop.options.map(o => o.toLowerCase()).sort();
    if (sorted[0] === 'false' && sorted[1] === 'true') {
      return { on: prop.options.find(o => o.toLowerCase() === 'true'), off: prop.options.find(o => o.toLowerCase() === 'false') };
    }
    return { on: prop.options.find(o => o.toLowerCase() === 'yes'), off: prop.options.find(o => o.toLowerCase() === 'no') };
  }

  // ─── Update "go up" bar (always in DOM, just update state) ───
  function updateGoUpBar() {
    const bar = document.getElementById('go-up-bar');
    if (!bar) return;
    const label = bar.querySelector('.go-up-label');
    if (parentInfo) {
      bar.classList.remove('disabled');
      label.innerHTML = `Go to parent selection: <strong>${escHtml(parentInfo.name)}</strong>`;
    } else {
      bar.classList.add('disabled');
      label.textContent = 'Top level — no parent';
    }
  }

  // ─── Render a property control ───
  function renderPropertyControl(prop, instanceId, isBulk, componentName) {
    const clean = cleanPropName(prop.name);

    // Boolean-like variants (true/false, yes/no) → render as toggle
    if (isBooleanLikeVariant(prop)) {
      const checked = getBooleanLikeChecked(prop);
      const vals = getBooleanLikeValues(prop);
      const evtType = isBulk ? 'bulk-set-variant' : 'set-variant';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <label class="toggle">
              <input type="checkbox" class="prop-variant-toggle" data-type="${evtType}" ${dataAttr}
                data-on="${escAttr(vals.on)}" data-off="${escAttr(vals.off)}" ${checked ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`;
    }

    if (prop.type === 'VARIANT' && prop.options && prop.options.length > 0) {
      const options = prop.options.map(opt =>
        `<option value="${escHtml(opt)}" ${opt === prop.currentValue ? 'selected' : ''}>${escHtml(opt)}</option>`
      ).join('');

      const evtType = isBulk ? 'bulk-set-variant' : 'set-variant';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <select class="prop-select" data-type="${evtType}" ${dataAttr}>
              ${options}
            </select>
          </div>
        </div>`;
    }

    if (prop.type === 'BOOLEAN') {
      const checked = prop.currentValue === true || prop.currentValue === 'true';
      const evtType = isBulk ? 'bulk-set-component-property' : 'set-component-property';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <label class="toggle">
              <input type="checkbox" class="prop-toggle" data-type="${evtType}" ${dataAttr} ${checked ? 'checked' : ''} />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>`;
    }

    if (prop.type === 'INSTANCE_SWAP') {
      const rawVal = String(prop.currentValue);
      const displayName = prop.currentValueName || (rawVal.length > 16 ? 'Instance Swap' : rawVal);
      const swapData = isBulk
        ? `data-swap-component="${escAttr(componentName)}" data-swap-prop="${escAttr(prop.name)}"`
        : `data-swap-instance="${escAttr(instanceId)}" data-swap-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <span class="instance-swap-value clickable" data-open-swap-search ${swapData}
              title="${escAttr(displayName)}">${escHtml(displayName)}</span>
          </div>
        </div>`;
    }

    if (prop.type === 'TEXT') {
      const evtType = isBulk ? 'bulk-set-component-property' : 'set-component-property';
      const dataAttr = isBulk
        ? `data-component="${escAttr(componentName)}" data-prop="${escAttr(prop.name)}"`
        : `data-instance="${escAttr(instanceId)}" data-prop="${escAttr(prop.name)}"`;

      return `
        <div class="property-row">
          <span class="property-label" title="${escAttr(prop.name)}">${escHtml(clean)}</span>
          <div class="property-control">
            <input type="text" class="prop-text" data-type="${evtType}" ${dataAttr}
              value="${escAttr(String(prop.currentValue))}" />
          </div>
        </div>`;
    }

    return '';
  }

  // ─── Get merged properties for a group of instances (for bulk view) ───
  function getMergedProperties(instances) {
    // Merge variant properties
    const variantMap = {};
    const compPropMap = {};

    for (const inst of instances) {
      for (const vp of inst.variantProperties) {
        if (!variantMap[vp.name]) {
          variantMap[vp.name] = { ...vp, values: new Set() };
        }
        variantMap[vp.name].values.add(vp.currentValue);
        // Merge options
        for (const o of vp.options) variantMap[vp.name].options = vp.options;
      }

      for (const cp of inst.componentProperties) {
        if (!compPropMap[cp.name]) {
          compPropMap[cp.name] = { ...cp, values: new Set() };
        }
        compPropMap[cp.name].values.add(String(cp.currentValue));
      }
    }

    const variants = Object.values(variantMap).map(v => ({
      name: v.name,
      type: 'VARIANT',
      currentValue: v.values.size === 1 ? [...v.values][0] : '(mixed)',
      options: v.options || [],
    }));

    const compProps = Object.values(compPropMap).map(v => ({
      name: v.name,
      type: v.type,
      currentValue: v.values.size === 1 ? v.currentValue : '(mixed)',
      options: v.options,
    }));

    return { variants, compProps };
  }

  // ─── Render Variants tab ───
  function renderVariantsTab(data) {
    const container = document.getElementById('variants-tab');
    if (!data.hasSelection) {
      detailViewComponent = null;
      container.innerHTML = renderEmpty('Select an object to see<br/>variant properties');
      return;
    }

    const groups = data.groupedByComponent;
    const names = Object.keys(groups);

    if (names.length === 0) {
      detailViewComponent = null;
      container.innerHTML = renderEmpty('No instances found<br/>in selection');
      return;
    }

    // If detail view is active but component no longer exists in selection, go back
    if (detailViewComponent && !groups[detailViewComponent]) {
      detailViewComponent = null;
    }

    // ─── Detail view: individual instances of one component ───
    if (detailViewComponent) {
      renderDetailView(container, data, detailViewComponent);
      return;
    }

    // ─── Bulk list view (main) ───
    let html = '';
    html += `<div class="summary-bar"><strong>${data.instances.length}</strong> instance${data.instances.length > 1 ? 's' : ''} from <strong>${names.length}</strong> component${names.length > 1 ? 's' : ''}</div>`;

    for (const compName of names) {
      const instances = groups[compName];
      const hasVariants = instances.some(i => i.variantProperties.length > 0);
      const hasCompProps = instances.some(i => i.componentProperties.length > 0);

      if (!hasVariants && !hasCompProps) continue;

      const merged = getMergedProperties(instances);
      const firstThumb = thumbnailCache[instances[0]?.id] || '';
      const someHidden = instances.some(i => !i.visible);
      const allHidden = instances.every(i => !i.visible);
      const hiddenIcon = `<span class="hidden-icon" title="${allHidden ? 'All instances hidden' : 'Some instances hidden'}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>`;

      html += `<div class="component-group">`;
      html += `<div class="component-header" data-toggle>
        <span class="component-name">
          <span class="collapse-arrow"></span>
          <img class="instance-thumb" data-thumb-id="${escAttr(instances[0]?.id || '')}" src="${firstThumb}" style="${firstThumb ? '' : 'display:none'}" />
          ${escHtml(compName)}
          ${someHidden ? hiddenIcon : ''}
        </span>
        <div class="component-actions">
          ${instances.length > 1 ? `<button class="btn-instances" data-open-detail="${escAttr(compName)}">
            ${instances.length} · Edit each
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          </button>` : ''}
          <button class="btn-icon" title="Select all instances" data-select-component="${escAttr(compName)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
        </div>
      </div>`;

      html += `<div class="component-body">`;

      // Bulk controls
      html += `<div class="bulk-section">`;

      if (merged.variants.length > 0 || merged.compProps.length > 0) {

        html += `<div class="properties">`;
        for (const vp of merged.variants) {
          html += renderPropertyControl(vp, null, true, compName);
        }
        for (const cp of merged.compProps) {
          if (cp.type !== 'VARIANT') {
            html += renderPropertyControl(cp, null, true, compName);
          }
        }
        html += `</div>`;
      }

      html += `</div>`;
      html += `</div></div>`;
    }

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Render detail view for a single component's instances ───
  function renderDetailView(container, data, compName) {
    const instances = data.groupedByComponent[compName] || [];

    let html = `<div class="detail-view">`;

    // Header with back button
    html += `<div class="detail-header">
      <button class="btn-back" data-back-to-bulk title="Back to bulk view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="detail-title">${escHtml(compName)}</span>
      <span class="detail-count">${instances.length} instances</span>
    </div>`;

    // Individual instances with their controls
    for (const inst of instances) {
      if (inst.variantProperties.length === 0 && inst.componentProperties.length === 0) continue;

      const thumbSrc = thumbnailCache[inst.id] || '';
      html += `<div class="detail-instance">`;
      html += `<div class="detail-instance-header" data-instance-toggle data-click-instance="${escAttr(inst.id)}">
        <span class="collapse-arrow"></span>
        <img class="instance-thumb" data-thumb-id="${escAttr(inst.id)}" src="${thumbSrc}" style="${thumbSrc ? '' : 'display:none'}" />
        <svg class="detail-instance-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ${thumbSrc ? 'style="display:none"' : ''}>
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="detail-instance-name">${escHtml(inst.name)}</span>
        ${!inst.visible ? `<span class="hidden-icon" title="Hidden layer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>` : ''}
      </div>`;

      html += `<div class="detail-instance-body"><div class="properties">`;
      for (const vp of inst.variantProperties) {
        html += renderPropertyControl({
          name: vp.name,
          type: 'VARIANT',
          currentValue: vp.currentValue,
          options: vp.options,
        }, inst.id, false, null);
      }
      for (const cp of inst.componentProperties) {
        if (cp.type !== 'VARIANT') {
          html += renderPropertyControl(cp, inst.id, false, null);
        }
      }
      html += `</div></div></div>`;
    }

    html += `</div>`;

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Render Instances tab ───
  function renderInstancesTab(data) {
    const container = document.getElementById('instances-tab');
    if (!data.hasSelection) {
      container.innerHTML = renderEmpty('Select an object to see<br/>nested instances');
      return;
    }

    const groups = data.groupedByComponent;
    const names = Object.keys(groups);

    if (names.length === 0) {
      container.innerHTML = renderEmpty('No instances found<br/>in selection');
      return;
    }

    let html = '';
    html += `<div class="summary-bar"><strong>${data.instances.length}</strong> instance${data.instances.length > 1 ? 's' : ''} from <strong>${names.length}</strong> component${names.length > 1 ? 's' : ''}</div>`;

    for (const compName of names) {
      const instances = groups[compName];
      const instThumb = thumbnailCache[instances[0]?.id] || '';

      html += `<div class="component-group">`;
      html += `<div class="component-header" data-toggle>
        <span class="component-name">
          <span class="collapse-arrow"></span>
          <img class="instance-thumb" data-thumb-id="${escAttr(instances[0]?.id || '')}" src="${instThumb}" style="${instThumb ? '' : 'display:none'}" />
          ${escHtml(compName)}
        </span>
        <div class="component-actions">
          <span class="component-count">${instances.length}</span>
          <button class="btn-icon" title="Select all" data-select-component="${escAttr(compName)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
        </div>
      </div>`;

      html += `<div class="component-body">`;
      for (const inst of instances) {
        html += `<div class="instance-row" style="--depth: ${inst.depth}" data-click-instance="${escAttr(inst.id)}">`;
        html += `<div class="instance-name">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          ${escHtml(inst.name)}
          ${!inst.visible ? `<span class="hidden-icon" title="Hidden"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span>` : ''}
          ${inst.depth > 0 ? `<span style="color:#bbb;font-size:10px">depth ${inst.depth}</span>` : ''}
        </div>`;
        if (inst.path) {
          html += `<div class="instance-path" title="${escAttr(inst.path)}">${escHtml(inst.path)}</div>`;
        }
        html += `</div>`;
      }
      html += `</div></div>`;
    }

    container.innerHTML = html;
    attachEventListeners();
  }

  // ─── Attach event listeners ───
  function attachEventListeners() {
    // Open swap picker
    document.querySelectorAll('[data-open-swap-search]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        openSwapPicker(
          el.dataset.swapProp,
          el.dataset.swapInstance || null,
          el.dataset.swapComponent || null
        );
      });
    });

    // Collapse/expand component groups
    document.querySelectorAll('[data-toggle]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.btn-icon') || e.target.closest('.component-actions')) return;
        el.closest('.component-group').classList.toggle('collapsed');
      });
    });

    // Collapse/expand detail instances (click on arrow)
    document.querySelectorAll('[data-instance-toggle] .collapse-arrow').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        el.closest('.detail-instance').classList.toggle('collapsed');
      });
    });


    // Open detail view for a component
    document.querySelectorAll('[data-open-detail]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        detailViewComponent = el.dataset.openDetail;
        if (currentData) renderVariantsTab(currentData);
      });
    });

    // Back to bulk view
    document.querySelectorAll('[data-back-to-bulk]').forEach(el => {
      el.addEventListener('click', () => {
        detailViewComponent = null;
        if (currentData) renderVariantsTab(currentData);
      });
    });

    // Click instance name in detail view to select
    document.querySelectorAll('.detail-instance-header[data-click-instance]').forEach(el => {
      el.addEventListener('click', () => {
        postMsg({ type: 'select-instance', instanceId: el.dataset.clickInstance });
      });
    });

    // Select component instances
    document.querySelectorAll('[data-select-component]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        postMsg({ type: 'select-instances-by-component', componentName: el.dataset.selectComponent });
      });
    });

    // Click instance to select
    document.querySelectorAll('[data-click-instance]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.properties') || e.target.closest('select') ||
            e.target.closest('input') || e.target.closest('.toggle')) return;
        postMsg({ type: 'select-instance', instanceId: el.dataset.clickInstance });
      });
    });

    // Variant selects
    document.querySelectorAll('.prop-select').forEach(el => {
      el.addEventListener('change', () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.value };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Boolean toggles
    document.querySelectorAll('.prop-toggle').forEach(el => {
      el.addEventListener('change', () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.checked };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Boolean-like variant toggles (true/false, yes/no)
    document.querySelectorAll('.prop-variant-toggle').forEach(el => {
      el.addEventListener('change', () => {
        const newValue = el.checked ? el.dataset.on : el.dataset.off;
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      });
    });

    // Text inputs (on blur / enter)
    document.querySelectorAll('.prop-text').forEach(el => {
      const send = () => {
        const msg = { type: el.dataset.type, propertyName: el.dataset.prop, newValue: el.value };
        if (el.dataset.instance) msg.instanceId = el.dataset.instance;
        if (el.dataset.component) msg.componentName = el.dataset.component;
        postMsg(msg);
      };
      el.addEventListener('blur', send);
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    });
  }

  // ─── HTML escaping ───
  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function escAttr(str) {
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ─── Bind click on swap search result items ───
  // ─── Swap Picker Functions ───

  const chevronSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>`;
  const folderSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`;
  const librarySvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`;
  const compSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;

  function openSwapPicker(propertyName, instanceId, componentName) {
    swapPickerState = {
      propertyName,
      instanceId,
      componentName,
      level: 'quickswap', // start with quick swap view
      history: [],
      sources: null,
      libraryCache: {},
      preferredValues: null,
      searchResults: null,
      selectedSource: '__quickswap__', // default source
      currentFolder: null,
      currentSet: null,
    };
    renderSwapPicker();
    postMsg({ type: 'get-swap-sources' });
    postMsg({ type: 'get-preferred-swap-values', propertyName });
  }

  function closeSwapPicker() {
    swapPickerState = null;
    const el = document.querySelector('.swap-picker');
    if (el) el.remove();
  }

  function navigateSwapPicker(level, data) {
    if (!swapPickerState) return;
    swapPickerState.history.push({
      level: swapPickerState.level,
      currentFolder: swapPickerState.currentFolder,
      currentSet: swapPickerState.currentSet,
    });
    swapPickerState.level = level;
    Object.assign(swapPickerState, data);
    swapPickerState.searchResults = null;
    renderSwapPickerBody();
    // Update title
    const titleEl = document.querySelector('.swap-picker-title');
    if (titleEl) {
      if (level === 'components' && data.currentFolder) titleEl.textContent = data.currentFolder;
      else if (level === 'variants' && data.currentSet) titleEl.textContent = data.currentSet.name;
      else titleEl.textContent = 'Choose component';
    }
  }

  function navigateSwapBack() {
    if (!swapPickerState) return;
    if (swapPickerState.history.length === 0) {
      closeSwapPicker();
      return;
    }
    const prev = swapPickerState.history.pop();
    swapPickerState.level = prev.level;
    swapPickerState.currentFolder = prev.currentFolder;
    swapPickerState.currentSet = prev.currentSet;
    swapPickerState.searchResults = null;
    renderSwapPickerBody();
    // Update title
    const titleEl = document.querySelector('.swap-picker-title');
    if (titleEl) titleEl.textContent = 'Choose component';
  }

  function applySwapFromPicker(componentIdOrKey) {
    if (!swapPickerState) return;
    postMsg({
      type: 'apply-swap-from-search',
      componentIdOrKey,
      propertyName: swapPickerState.propertyName,
      instanceId: swapPickerState.instanceId || null,
      bulkComponentName: swapPickerState.componentName || null,
    });
    closeSwapPicker();
  }

  function renderSwapPicker() {
    if (!swapPickerState) return;
    const s = swapPickerState;

    let picker = document.querySelector('.swap-picker');
    if (!picker) {
      picker = document.createElement('div');
      picker.className = 'swap-picker';
      document.body.appendChild(picker);
    }

    let title = 'Choose component';
    if (s.level === 'components' && s.currentFolder) title = s.currentFolder;
    if (s.level === 'variants' && s.currentSet) title = s.currentSet.name;

    // Source dropdown options
    let sourceOptions = `<option value="__quickswap__">Quick swap</option>`;
    if (s.sources) {
      for (const src of s.sources) {
        sourceOptions += `<option value="${escAttr(src.key)}" ${s.selectedSource === src.key ? 'selected' : ''}>${escHtml(src.name)}</option>`;
      }
    }

    let html = `<div class="swap-picker-header">
      <button class="btn-back" id="swap-picker-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="swap-picker-title">${escHtml(title)}</span>
    </div>`;

    html += `<div class="swap-picker-search">
      <input type="text" id="swap-picker-search-input" placeholder="Search..." value="${escAttr(s.searchQuery || '')}" />
      <select class="swap-source-select" id="swap-source-select">${sourceOptions}</select>
    </div>`;

    html += `<div class="swap-picker-body" id="swap-picker-body">`;
    html += renderSwapPickerBodyContent();
    html += `</div>`;

    picker.innerHTML = html;

    // Back
    document.getElementById('swap-picker-back').addEventListener('click', navigateSwapBack);

    // Source select
    document.getElementById('swap-source-select').addEventListener('change', (e) => {
      const val = e.target.value;
      s.selectedSource = val;
      s.history = [];
      s.currentFolder = null;
      s.currentSet = null;
      s.searchResults = null;

      if (val === '__quickswap__') {
        s.level = 'quickswap';
        renderSwapPickerBody();
      } else {
        s.level = 'folders';
        renderSwapPickerBody();
        // Load if not cached
        if (!s.libraryCache[val]) {
          if (val === '__local__') {
            postMsg({ type: 'get-local-components' });
          } else {
            postMsg({ type: 'get-library-contents', libraryKey: val });
          }
        }
      }
    });

    // Search
    const searchInput = document.getElementById('swap-picker-search-input');
    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      s.searchQuery = q;
      if (q.length < 2) {
        s.searchResults = null;
        renderSwapPickerBody();
        return;
      }
      document.getElementById('swap-picker-body').innerHTML =
        `<div class="swap-picker-loading"><div class="spinner"></div>Searching...</div>`;
      searchTimer = setTimeout(() => {
        postMsg({ type: 'search-swap-all', query: q });
      }, 300);
    });
    searchInput.focus();

    bindPickerClicks();
  }

  function renderSwapPickerBodyContent() {
    if (!swapPickerState) return '';
    const s = swapPickerState;

    if (s.searchResults) return renderPickerSearchResults(s.searchResults);
    if (s.level === 'quickswap') return renderPickerQuickSwap();
    if (s.level === 'folders') return renderPickerFolders();
    if (s.level === 'components') return renderPickerComponents();
    if (s.level === 'variants') return renderPickerVariants();
    return '';
  }

  function renderSwapPickerBody() {
    if (!swapPickerState) return;
    const body = document.getElementById('swap-picker-body');
    if (!body) return;
    body.innerHTML = renderSwapPickerBodyContent();
    bindPickerClicks();
  }

  function renderPickerQuickSwap() {
    const s = swapPickerState;

    if (s.preferredValues === null) {
      return `<div class="swap-picker-loading"><div class="spinner"></div>Loading quick swap...</div>`;
    }

    if (s.preferredValues.length === 0) {
      return `<div class="swap-picker-empty">No quick swap variants found for this property.<br/>Try selecting a library from the dropdown above, or use search.</div>`;
    }

    let html = '';
    for (const pv of s.preferredValues) {
      const thumb = pv.thumbnailDataUrl
        ? `<img class="swap-thumb" src="${pv.thumbnailDataUrl}" />`
        : `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      html += `<div class="swap-component-item" data-picker-apply="${escAttr(pv.id)}">
        ${thumb}
        <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(pv.name)}</div></div>
      </div>`;
    }

    return html;
  }

  function renderPickerFolders() {
    const s = swapPickerState;
    const cacheKey = s.selectedSource;
    const data = s.libraryCache[cacheKey];

    if (!data) {
      return `<div class="swap-picker-loading"><div class="spinner"></div>Loading...</div>`;
    }

    let html = '';
    for (const folder of data.folders) {
      html += `<div class="swap-folder-item" data-picker-folder="${escAttr(folder.name)}">
        <span class="swap-folder-icon">${folderSvg}</span>
        <span class="swap-item-name">${escHtml(folder.name)}</span>
        <span class="swap-item-count">${folder.components.length}</span>
        <span class="swap-item-chevron">${chevronSvg}</span>
      </div>`;
    }

    return html || `<div class="swap-picker-empty">No components found</div>`;
  }

  function renderPickerComponents() {
    const s = swapPickerState;
    const cacheKey = s.selectedSource;
    const data = s.libraryCache[cacheKey];
    if (!data) return `<div class="swap-picker-empty">No data</div>`;

    const folder = data.folders.find(f => f.name === s.currentFolder);
    if (!folder) return `<div class="swap-picker-empty">Folder not found</div>`;

    let html = '';
    for (const comp of folder.components) {
      const isSet = comp.type === 'COMPONENT_SET';
      const thumb = comp.thumbnailUrl
        ? `<img class="swap-thumb" src="${comp.thumbnailUrl}" />`
        : (comp.thumbnailDataUrl
          ? `<img class="swap-thumb" src="${comp.thumbnailDataUrl}" />`
          : `<div class="swap-thumb-placeholder">${compSvg}</div>`);

      if (isSet) {
        html += `<div class="swap-component-item" data-picker-set="${escAttr(comp.key || comp.id)}" data-set-name="${escAttr(comp.name)}" data-set-variants='${escAttr(JSON.stringify(comp.variants || []))}'>
          ${thumb}
          <div class="swap-comp-info">
            <div class="swap-comp-name">${escHtml(comp.name)}</div>
            <div class="swap-comp-source">${(comp.variants || []).length} variants</div>
          </div>
          <span class="swap-item-chevron">${chevronSvg}</span>
        </div>`;
      } else {
        html += `<div class="swap-component-item" data-picker-apply="${escAttr(comp.key || comp.id)}">
          ${thumb}
          <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(comp.name)}</div></div>
        </div>`;
      }
    }

    return html || `<div class="swap-picker-empty">No components</div>`;
  }

  function renderPickerVariants() {
    const s = swapPickerState;
    if (!s.currentSet || !s.currentSet.variants) {
      return `<div class="swap-picker-empty">No variants</div>`;
    }

    let html = '';
    for (const v of s.currentSet.variants) {
      const thumb = v.thumbnailUrl
        ? `<img class="swap-thumb" src="${v.thumbnailUrl}" />`
        : `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      html += `<div class="swap-component-item" data-picker-apply="${escAttr(v.key || v.id)}">
        ${thumb}
        <div class="swap-comp-info"><div class="swap-comp-name">${escHtml(v.name)}</div></div>
      </div>`;
    }

    return html;
  }

  function renderPickerSearchResults(results) {
    if (!results || results.length === 0) {
      return `<div class="swap-picker-empty">No components found</div>`;
    }

    let html = '';
    for (const r of results) {
      const thumb = r.thumbnailUrl
        ? `<img class="swap-thumb" src="${r.thumbnailUrl}" />`
        : `<div class="swap-thumb-placeholder">${compSvg}</div>`;
      html += `<div class="swap-component-item" data-picker-apply="${escAttr(r.id)}">
        ${thumb}
        <div class="swap-comp-info">
          <div class="swap-comp-name">${escHtml(r.name)}</div>
          ${r.source ? `<div class="swap-comp-source">${escHtml(r.source)}</div>` : ''}
        </div>
      </div>`;
    }

    return html;
  }

  function bindPickerClicks() {
    // Apply swap
    document.querySelectorAll('[data-picker-apply]').forEach(el => {
      el.addEventListener('click', () => applySwapFromPicker(el.dataset.pickerApply));
    });

    // Navigate to folder
    document.querySelectorAll('[data-picker-folder]').forEach(el => {
      el.addEventListener('click', () => {
        navigateSwapPicker('components', { currentFolder: el.dataset.pickerFolder });
      });
    });

    // Navigate to component set (variants)
    document.querySelectorAll('[data-picker-set]').forEach(el => {
      el.addEventListener('click', () => {
        const variants = JSON.parse(el.dataset.setVariants || '[]');
        navigateSwapPicker('variants', {
          currentSet: { key: el.dataset.pickerSet, name: el.dataset.setName, variants },
        });
      });
    });
  }

  function bindSwapResultClicks(container) {
    container.querySelectorAll('.swap-search-item').forEach(item => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        postMsg({
          type: 'apply-swap-from-search',
          componentIdOrKey: item.dataset.applySwap,
          propertyName: item.dataset.applyProp,
          instanceId: item.dataset.applyInstance || null,
          bulkComponentName: item.dataset.applyComponent || null,
        });
      });
    });
  }

  // ─── Message from sandbox ───
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'loading') {
      const loadingHtml = `<div class="loading-state"><div class="spinner"></div><span class="loading-text">Scanning...</span></div>`;
      document.getElementById('variants-tab').innerHTML = loadingHtml;
      document.getElementById('instances-tab').innerHTML = loadingHtml;
    }

    if (msg.type === 'scan-progress') {
      document.querySelectorAll('.loading-text').forEach(el => {
        el.textContent = `Scanned ${msg.scanned} layers · ${msg.found} instances found`;
      });
    }

    if (msg.type === 'selection-data') {
      currentData = msg.data;
      parentInfo = msg.parentInfo || null;
      swapOptionsMap = {};
      updateGoUpBar();
      renderVariantsTab(currentData);
      renderInstancesTab(currentData);

      // Request thumbnails for visible instances (first 20)
      if (currentData.instances && currentData.instances.length > 0) {
        const ids = currentData.instances
          .slice(0, 20)
          .map(i => i.id)
          .filter(id => !thumbnailCache[id]);
        if (ids.length > 0) {
          postMsg({ type: 'get-thumbnails', nodeIds: ids });
        }
      }
    }

    if (msg.type === 'thumbnails') {
      Object.assign(thumbnailCache, msg.thumbnails || {});
      // Update existing thumbnail placeholders
      for (const [id, url] of Object.entries(msg.thumbnails || {})) {
        document.querySelectorAll(`[data-thumb-id="${id}"]`).forEach(el => {
          el.src = url;
          el.style.display = 'block';
        });
      }
    }

    if (msg.type === 'search-results') {
      const resultsDiv = document.querySelector('.swap-search-results');
      if (!resultsDiv) return;
      if (msg.results.length === 0) {
        resultsDiv.innerHTML = '<div class="swap-search-hint">No components found</div>';
        return;
      }
      resultsDiv.innerHTML = msg.results.map(r =>
        `<div class="swap-search-item" data-apply-swap="${escAttr(r.id)}"
          data-apply-prop="${escAttr(msg.propertyName)}"
          ${msg.instanceId ? `data-apply-instance="${escAttr(msg.instanceId)}"` : ''}
          ${msg.componentName ? `data-apply-component="${escAttr(msg.componentName)}"` : ''}
        >${escHtml(r.name)}</div>`
      ).join('');
      bindSwapResultClicks(resultsDiv);
    }

    if (msg.type === 'swap-options') {
      const newOptions = msg.swapOptionsMap || {};
      Object.assign(swapOptionsMap, newOptions);
      if (currentData) {
        renderVariantsTab(currentData);
        renderInstancesTab(currentData);
      }
    }

    // ─── Swap Picker messages ───

    if (msg.type === 'swap-sources') {
      if (swapPickerState) {
        swapPickerState.sources = msg.sources;
        // Update the source dropdown
        const selectEl = document.getElementById('swap-source-select');
        if (selectEl) {
          let opts = `<option value="__quickswap__">Quick swap</option>`;
          for (const src of msg.sources) {
            opts += `<option value="${escAttr(src.key)}">${escHtml(src.name)}</option>`;
          }
          selectEl.innerHTML = opts;
          selectEl.value = swapPickerState.selectedSource;
        }
      }
    }

    if (msg.type === 'preferred-swap-values') {
      if (swapPickerState && swapPickerState.propertyName === msg.propertyName) {
        swapPickerState.preferredValues = msg.values;
        if (swapPickerState.level === 'quickswap') {
          renderSwapPickerBody();
        }
      }
    }

    if (msg.type === 'library-contents') {
      if (swapPickerState) {
        swapPickerState.libraryCache[msg.libraryKey] = { folders: msg.folders };
        renderSwapPickerBody();
      }
    }

    if (msg.type === 'local-contents') {
      if (swapPickerState) {
        swapPickerState.libraryCache['__local__'] = { folders: msg.folders };
        renderSwapPickerBody();
      }
    }

    if (msg.type === 'swap-search-results') {
      if (swapPickerState) {
        swapPickerState.searchResults = msg.results;
        renderSwapPickerBody();
      }
    }
  };
</script>
</body>
</html>
